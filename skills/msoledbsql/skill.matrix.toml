id = "msoledbsql"
name = "OLE DB Driver 19 for SQL Server"
version = "1.0.0"
description = "Microsoft OLE DB Driver 19 — IRowsetFastLoad, IBCPSession2, ISSCommandWithParameters, COM interfaces"
category = "native-sql"
files = true
runtime = "xcfe"
sdk_header = "C:/Program Files (x86)/Microsoft SQL Server/Client SDK/OLEDB/194/SDK/Include/msoledbsql.h"
sdk_lib_x86 = "C:/Program Files (x86)/Microsoft SQL Server/Client SDK/OLEDB/194/SDK/Lib/x86/msoledbsql19.lib"

[actions.fast_load]
description = "Bulk-insert rows via IRowsetFastLoad; produces shard checkpoint on commit"
entrypoint = "fast_load"
permissions = ["exec:oledb", "write:artifacts"]
resources.memory = "512MB"
resources.timeout = "120s"
shard_checkpoint = true

[actions.bcp_session]
description = "Run IBCPSession2 bulk copy with BCPSetBulkMode"
entrypoint = "bcp_session"
permissions = ["exec:oledb", "write:artifacts"]
resources.memory = "256MB"
resources.timeout = "60s"
shard_checkpoint = true

[actions.ss_error]
description = "Retrieve ISQLServerErrorInfo extended diagnostics"
entrypoint = "ss_error"
permissions = ["exec:oledb"]
resources.memory = "32MB"
resources.timeout = "5s"

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"
