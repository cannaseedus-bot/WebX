id = "scxqdds"
name = "SCXQDDS Tools"
version = "1.0.0"
description = "Native SCXQDDS tensor container tools: decode binary shard files, run self-tests, and execute vector pipelines. Operates on .scxqdds training shard files produced by shard-artifacts.js."
category = "native-asx"
files = true
binary_root = "artifacts/native-asx"

[actions.decode]
description = "Decode a .scxqdds file and emit chunk/CRC metadata as JSON"
entrypoint = "scxqdds_decode.exe"
permissions = ["read:artifacts"]
resources.memory = "64MB"
resources.timeout = "10s"

[actions.selftest]
description = "Run the built-in SCXQDDS self-test suite and write results to JSON"
entrypoint = "scxqdds_selftest.exe"
permissions = ["read:artifacts", "write:artifacts"]
resources.memory = "64MB"
resources.timeout = "15s"

[actions.vector_run]
description = "Execute a SCXQDDS tensor shard through the native vector runner pipeline"
entrypoint = "scxqdds_vector_runner.exe"
permissions = ["read:artifacts", "exec:gpu"]
resources.memory = "512MB"
resources.timeout = "60s"
