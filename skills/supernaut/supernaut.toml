[skill]
name = "supernaut_skill"
entry = "SupernautActions.health"

[tools]
code = true
model = true
dolphin = true
powershell = true

[training]
dataset_root = "codex/dolphin-coder"
output_root = "artifacts/dolphin-coder"

[handler]
mode = "hybrid"
backend = "manifest"
manifestPath = "../../../model/manifest.json"
gta1Path = "../../../model/expert.gta1"
preferGta1 = false

[runtime]
dataRoot = "./config"

[paths]
codexRoot = "codex"
codexClass = "codex/class/supernaut.schema.xjson"
codexControl = "codex/control/supernaut.control.asx"

[manifest]
actions = ["AgenticMicronautAddon" "ASXCFEStackIntel" "DatasetTraining"
