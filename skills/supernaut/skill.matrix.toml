[skill]
name        = "supernaut"
version     = "1.0.0"
description = "Supernaut merged runtime pack — composes all Micronaut skills, action-log, pipx_compiler, RLHF records"
runtime     = "xcfe"
shard_checkpoint = true

[actions]
compose          = { entry = "SupernautActions.compose",          runtime = "xcfe" }
log_action       = { entry = "SupernautActions.log_action",       runtime = "xcfe" }
run_pipx         = { entry = "SupernautActions.run_pipx",         runtime = "xcfe" }
arbitrate        = { entry = "SupernautActions.arbitrate",        runtime = "xcfe" }
list_skills      = { entry = "SupernautActions.list_skills",      runtime = "xcfe" }
merge_manifests  = { entry = "SupernautActions.merge_manifests",  runtime = "xcfe" }
pack_shard       = { entry = "SupernautActions.pack_shard",       runtime = "xcfe" }

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"
source   = "examples/skills/supernaut/supernaut_manifest.json"

[merged_skills]
names = [
  "workflow-orchestrator",
  "sql-skill",
  "supernaut",
  "wordpad",
  "micronaut",
  "codex-agent",
  "asx-verifier",
  "agentic-micronaut",
  "as-xcfe-stack-intel",
  "micronaut-model",
  "windows-sdk",
  "scx2-runtime",
  "scxqdds",
  "scxq2-vector",
  "vs-native-tools",
  "sk-coordinator",
  "mx2lex",
  "netfx-sdk",
  "pipx-compiler",
  "powershell-ise",
  "vs2019-tools",
  "vs2022-tools",
  "vs-insiders",
  "team-lead",
  "dataset-training",
  "cloudflare-deploy",
  "project-factory",
  "commands",
  "doc",
  "sqlite3",
  "msbuild-nuget",
  "figma",
  "figma-implement-design",
  "vsdevcmd",
  "winkit-81"
]
