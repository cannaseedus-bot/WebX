[skill]
name        = "develop-web-game"
version     = "1.0.0"
description = "Web game development — canvas/WebGL game loop, asset pipeline, input handling, physics, and Phaser/Three.js scaffolding"
runtime     = "xcfe"
shard_checkpoint = false

[actions]
scaffold_game    = { entry = "DevelopWebGameActions.scaffold_game",    runtime = "xcfe" }
build_assets     = { entry = "DevelopWebGameActions.build_assets",     runtime = "xcfe" }
write_game_loop  = { entry = "DevelopWebGameActions.write_game_loop",  runtime = "xcfe" }
add_physics      = { entry = "DevelopWebGameActions.add_physics",      runtime = "xcfe" }
export_bundle    = { entry = "DevelopWebGameActions.export_bundle",    runtime = "xcfe" }
