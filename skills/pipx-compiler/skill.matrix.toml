id = "pipx-compiler"
name = "Pipx Compiler"
version = "1.0.0"
description = "Invoke pipx_compiler.exe to build graph/mesh/scene toolchains"
category = "compiler"
files = false
json_compiler = true
runtime = "xcfe"
shard_checkpoint = true

[actions.run]
description = "Run pipx_compiler with arbitrary args"
entrypoint = "run"
permissions = ["exec:pipx_compiler"]
resources.memory = "128MB"
resources.timeout = "30s"

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"
