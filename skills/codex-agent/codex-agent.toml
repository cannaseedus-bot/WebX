[agent]
name = "codex_root_agent"
entry = "CodexRootActions.health"

[routes]
"health" = "CodexRootActions.health"
"model_probe" = "CodexRootActions.modelProbe"
"model_list" = "CodexRootActions.modelList"
"model_select" = "CodexRootActions.modelSelect"
"dolphin_code_review" = "DolphinCoderActions.codeReview"
"dolphin_bug_report" = "DolphinCoderActions.bugReport"
"powershell_health" = "PowerShellAgentActions.health"
"powershell_layout" = "PowerShellAgentActions.scaffoldLayout"
"powershell_catalog" = "PowerShellAgentActions.commandCatalog"
"powershell_run" = "PowerShellAgentActions.runCommand"

[skill]
name = "codex_root_skill"
entry = "CodexRootActions.health"

[tools]
code = true
model = true
powershell = true
dolphin = true

[handler]
mode = "hybrid"
backend = "manifest"
manifestPath = "../../../model/manifest.json"
gta1Path = "../../../model/expert.gta1"
preferGta1 = false

[runtime]
dataRoot = "./config"
