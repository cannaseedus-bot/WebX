id = "steps-recorder"
name = "Windows Steps Recorder (PSR)"
version = "1.0.0"
description = "Windows Problem Steps Recorder (psr.exe) — captures a sequence of user actions as annotated screenshots and saves them as a .mht (MHTML) report. Useful as an agent step documentation tool: launch psr.exe before a workflow, perform steps, stop — output is a self-contained HTML archive with timestamps, screenshots, and action descriptions. Combine with voice-tts (say npm) for a full verbal + visual instruction agent. Start: psr.exe /start /output C:\\steps.zip /sc 1. Stop: psr.exe /stop."
category = "tool"
files = false

[env]
exe = "C:\\Windows\\System32\\psr.exe"
lnk = "C:\\ProgramData\\Microsoft\\Windows\\Start Menu\\Programs\\Accessories\\Steps Recorder.lnk"

[cli_flags]
"/start"        = "Begin recording"
"/stop"         = "Stop recording"
"/output <path>" = "Save ZIP/MHT output to path"
"/sc 1"         = "Capture screenshots (1=yes, 0=no)"
"/maxsc <n>"    = "Max screenshots to capture (default 25)"
"/gui 0"        = "Hide the GUI (silent recording)"
"/arcetl 1"     = "Include raw ETL event trace in output"

[actions.record]
description = "Launch PSR to record user steps as annotated screenshots"
entrypoint  = "psr.exe"
permissions = ["exec:ui", "write:output"]
resources.memory  = "64MB"
resources.timeout = "none"
