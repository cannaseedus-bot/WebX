id = "winkit-81"
name = "Windows Kits 8.1 (WinMD remnant)"
version = "1.0.0"
description = "Near-empty Windows 8.1 SDK remnant. Contains only Windows.winmd — the annotated WinRT type metadata for all Windows 8.1 APIs. No headers or libs are installed. Useful when: cross-referencing WinRT API contracts from Windows 8.1, processing .winmd files with mdmerge.exe or winmdidl.exe, or verifying that a WinRT interface was present in 8.1."
category = "sdk"
files = false

[env]
root     = "C:\\Program Files (x86)\\Windows Kits\\8.1"
winmd    = "C:\\Program Files (x86)\\Windows Kits\\8.1\\References\\CommonConfiguration\\Neutral\\Annotated\\Windows.winmd"

[key_files]
windows_winmd = "References\\CommonConfiguration\\Neutral\\Annotated\\Windows.winmd"

[actions.query_winmd]
description = "Locate and describe the Windows 8.1 WinRT metadata file (Windows.winmd)"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "8MB"
resources.timeout = "1s"
