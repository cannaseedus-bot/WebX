type: foundry_agent
name: SemanticAgenticModel
description: A declarative agent model that exercises Semantic Kernel functions, OpenAPI, code interpreter, file search, and DuckDuckGo-backed web search.
instructions: >
  You are SemanticAgenticModel, a deterministic orchestration agent.
  Use kernel functions for local reasoning, OpenAPI for external API calls,
  code interpreter for computation, file search for grounding, and DuckDuckGo-backed web search
  for live web context when required.
model:
  id: gpt-4o-mini
  options:
    temperature: 0.2
metadata:
  agentic_models:
    - name: function-model
      kind: micronaut
      tool: function
      role: deterministic-local-reasoning
      aware_of:
        - semantic-kernel-functions
        - openapi
        - code_interpreter
        - file_search
        - duckduckgo-web-search
    - name: openapi-model
      kind: micronaut
      tool: openapi
      role: external-api-grounding
      aware_of:
        - semantic-kernel-functions
        - openapi
        - code_interpreter
        - file_search
        - duckduckgo-web-search
    - name: code-interpreter-model
      kind: micronaut
      tool: code_interpreter
      role: computation-and-file-work
      aware_of:
        - semantic-kernel-functions
        - openapi
        - code_interpreter
        - file_search
        - duckduckgo-web-search
    - name: file-search-model
      kind: micronaut
      tool: file_search
      role: retrieval-grounding
      aware_of:
        - semantic-kernel-functions
        - openapi
        - code_interpreter
        - file_search
        - duckduckgo-web-search
    - name: web-search-model
      kind: micronaut
      tool: function
      role: live-web-grounding
      provider: duckduckgo
      aware_of:
        - semantic-kernel-functions
        - openapi
        - code_interpreter
        - file_search
        - duckduckgo-web-search
tools:
  - type: function
    id: WeatherPlugin.Current
    description: Use a kernel function for deterministic weather lookup.
    options:
      parameters:
        - name: location
          type: string
          required: true
          description: The location to evaluate.
  - type: openapi
    id: GetCurrentWeather
    description: Query the current weather through an OpenAPI endpoint.
    options:
      specification: |
        {
          "openapi": "3.1.0",
          "info": {
            "title": "Semantic Agentic Weather API",
            "description": "Weather grounding endpoint used by the semantic agentic model.",
            "version": "v1.0.0"
          },
          "servers": [
            {
              "url": "https://wttr.in"
            }
          ],
          "auth": [],
          "paths": {
            "/{location}": {
              "get": {
                "description": "Get weather information for a specific location",
                "operationId": "GetCurrentWeather",
                "parameters": [
                  {
                    "name": "location",
                    "in": "path",
                    "description": "City or location to retrieve the weather for",
                    "required": true,
                    "schema": {
                      "type": "string"
                    }
                  },
                  {
                    "name": "format",
                    "in": "query",
                    "description": "Always use j1 value for this parameter",
                    "required": true,
                    "schema": {
                      "type": "string",
                      "default": "j1"
                    }
                  }
                ],
                "responses": {
                  "200": {
                    "description": "Successful response",
                    "content": {
                      "text/plain": {
                        "schema": {
                          "type": "string"
                        }
                      }
                    }
                  },
                  "404": {
                    "description": "Location not found"
                  }
                },
                "deprecated": false
              }
            }
          },
          "components": {
            "schemes": {}
          }
        }
  - type: code_interpreter
    description: Run code for analysis, synthesis, and file manipulation.
    options:
      file_ids:
        - file_1
        - file_2
      data_sources:
        - asset_identifier: data_source_1
          asset_type: uri_asset
        - asset_identifier: data_source_2
          asset_type: id_asset
  - type: file_search
    description: Ground responses against indexed files.
    options:
      vector_store_ids:
        - vector_store_1
  - type: function
    id: WebSearchPlugin.Search
    description: Search the web through a DuckDuckGo-backed SK function.
    options:
      parameters:
        - name: query
          type: string
          required: true
          description: The search query to run against DuckDuckGo.
