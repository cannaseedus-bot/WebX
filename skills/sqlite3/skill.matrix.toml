id = "sqlite3"
name = "SQLite3"
version = "1.0.0"
description = "SQLite3 C API — open/prepare/bind/step/finalize, WAL mode, FTS5, JSON1, backup API, custom functions"
category = "embedded-sql"
files = true
runtime = "xcfe"
shard_checkpoint = true

[actions.open]
description = "Open a SQLite3 database (supports :memory:, WAL, URI)"
entrypoint = "open"
permissions = ["read:filesystem", "write:filesystem"]
resources.memory = "32MB"
resources.timeout = "5s"

[actions.query]
description = "Prepare and execute a parameterized SQL query"
entrypoint = "query"
permissions = ["read:filesystem"]
resources.memory = "64MB"
resources.timeout = "30s"

[actions.pack_checkpoint_shard]
description = "Export SQLite table to SCXQDDS checkpoint shard via shard-artifacts.js"
entrypoint = "pack_checkpoint_shard"
permissions = ["read:filesystem", "write:artifacts"]
resources.memory = "256MB"
resources.timeout = "60s"

[actions.fts5_query]
description = "Full-text search via FTS5 virtual table with MATCH operator"
entrypoint = "fts5_query"
permissions = ["read:filesystem"]
resources.memory = "128MB"
resources.timeout = "15s"

[actions.backup]
description = "Online backup via sqlite3_backup_init/step/finish"
entrypoint = "backup"
permissions = ["read:filesystem", "write:filesystem"]
resources.memory = "128MB"
resources.timeout = "120s"

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"
