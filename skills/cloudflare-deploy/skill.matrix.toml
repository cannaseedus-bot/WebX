[skill]
name        = "cloudflare-deploy"
version     = "1.0.0"
description = "Cloudflare deploy — Workers, Pages, D1 SQL, R2 storage, KV, Durable Objects deploy and config management"
runtime     = "xcfe"
shard_checkpoint = false

[actions]
deploy_worker    = { entry = "CloudflareDeployActions.deploy_worker",    runtime = "xcfe" }
deploy_pages     = { entry = "CloudflareDeployActions.deploy_pages",     runtime = "xcfe" }
publish_kv       = { entry = "CloudflareDeployActions.publish_kv",       runtime = "xcfe" }
upload_r2        = { entry = "CloudflareDeployActions.upload_r2",        runtime = "xcfe" }
migrate_d1       = { entry = "CloudflareDeployActions.migrate_d1",       runtime = "xcfe" }
list_deployments = { entry = "CloudflareDeployActions.list_deployments", runtime = "xcfe" }
