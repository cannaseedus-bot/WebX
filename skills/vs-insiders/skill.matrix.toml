id = "vs-insiders"
name = "VS Insiders Developer Tools"
version = "1.0.0"
description = "Visual Studio 2026 Insiders (preview/bleeding-edge) developer environment. Full install at C:\\Program Files\\Microsoft Visual Studio\\18\\Insiders. Covers Developer PowerShell (Enter-VsDevShell c67d4bb6) and Developer Command Prompt (VsDevCmd.bat). Use when testing new compiler/toolset features ahead of stable VS 2026."
category = "compiler"
files = false

[env.insiders]
root         = "C:\\Program Files\\Microsoft Visual Studio\\18\\Insiders"
devshell_dll = "C:\\Program Files\\Microsoft Visual Studio\\18\\Insiders\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll"
vsdevcmd     = "C:\\Program Files\\Microsoft Visual Studio\\18\\Insiders\\Common7\\Tools\\VsDevCmd.bat"
instance_id  = "c67d4bb6"

[env.buildtools]
root         = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools"
devshell_dll = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll"
vsdevcmd     = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\Common7\\Tools\\VsDevCmd.bat"
instance_id  = "9498ed3d"

[actions.devshell_insiders]
description = "Enter VS Insiders Developer PowerShell (Enter-VsDevShell c67d4bb6)"
entrypoint   = "powershell"
permissions  = ["read:env", "exec:powershell"]
resources.memory  = "64MB"
resources.timeout = "15s"

[actions.devcmd_insiders]
description = "Open VS Insiders Developer Command Prompt (VsDevCmd.bat)"
entrypoint   = "cmd"
permissions  = ["read:env", "exec:cmd"]
resources.memory  = "32MB"
resources.timeout = "10s"

[actions.devshell_buildtools]
description = "Enter VS 2026 BuildTools Developer PowerShell via DevShell (Enter-VsDevShell 9498ed3d)"
entrypoint   = "powershell"
permissions  = ["read:env", "exec:powershell"]
resources.memory  = "64MB"
resources.timeout = "15s"

[actions.devcmd_buildtools]
description = "Open VS 2026 BuildTools Developer Command Prompt (VsDevCmd.bat)"
entrypoint   = "cmd"
permissions  = ["read:env", "exec:cmd"]
resources.memory  = "32MB"
resources.timeout = "10s"
