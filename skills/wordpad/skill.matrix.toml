id = "wordpad"
name = "WordPad (Agent Scratchpad & Sandbox)"
version = "1.0.0"
description = "Windows WordPad — rich text editor used as an agent scratchpad and sandbox. Agents can open WordPad to draft, inspect, or hand-edit text/RTF content outside of the terminal. Supports plain text (.txt), rich text (.rtf), Office Open XML (.docx), and OpenDocument (.odt) via WordpadFilter.dll. Use when an agent needs a visible, interactive scratch surface for working through a problem, composing structured output for human review, or staging content before committing to a file."
category = "tool"
files = false

[env]
exe        = "C:\\Program Files (x86)\\Windows NT\\Accessories\\wordpad.exe"
filter_dll = "C:\\Program Files (x86)\\Windows NT\\Accessories\\WordpadFilter.dll"
locale_dir = "C:\\Program Files (x86)\\Windows NT\\Accessories\\en-US"

[supported_formats]
txt   = "Plain text"
rtf   = "Rich Text Format"
docx  = "Office Open XML (via WordpadFilter.dll)"
odt   = "OpenDocument Text (via WordpadFilter.dll)"

[actions.open]
description = "Open a file in WordPad for viewing or hand-editing"
entrypoint  = "wordpad.exe"
permissions = ["exec:ui"]
resources.memory  = "32MB"
resources.timeout = "none"

[actions.open_blank]
description = "Open a blank WordPad scratchpad window"
entrypoint  = "wordpad.exe"
permissions = ["exec:ui"]
resources.memory  = "32MB"
resources.timeout = "none"

[actions.open_rtf]
description = "Open or create an RTF scratch document"
entrypoint  = "wordpad.exe"
permissions = ["exec:ui", "write:scratch"]
resources.memory  = "32MB"
resources.timeout = "none"
