id = "voice-tts"
name = "Voice TTS Agent (say npm + Windows SAPI)"
version = "1.0.0"
description = "Text-to-speech for agent verbal instructions using the 'say' npm package (npm install say). Wraps Windows SAPI — zero config, no API key, no internet, uses built-in Windows voices (Microsoft David Desktop, Microsoft Zira Desktop, Microsoft Mark Desktop). Agents use this to narrate steps, announce events, or leave verbal instructions alongside visual steps from Steps Recorder. say.speak(text), say.speak(text, voice, speed), say.export(text, voice, speed, filename, cb) to save .wav. Combine with psr.exe (steps-recorder) for full verbal+visual instruction recording. Alternative if better voice quality needed: node-edge-tts (Microsoft Edge neural voices, requires internet, free)."
category = "tool"
files = false

[env]
npm_package  = "say"
install      = "npm install say"
windows_tts  = "Windows SAPI (built-in, no API key)"

[windows_voices]
david = "Microsoft David Desktop"
zira  = "Microsoft Zira Desktop"
mark  = "Microsoft Mark Desktop"

[alt_packages]
"node-edge-tts"  = "Microsoft Edge neural TTS — free, internet required, higher quality"
"@azure/cognitiveservices-speech-sdk" = "Azure Cognitive Services TTS — API key required, premium voices"
"piper-tts"      = "Local neural TTS — fully offline, high quality, binary download required"

[actions.speak]
description = "Narrate a string using Windows SAPI via say.speak()"
entrypoint  = "say"
permissions = ["exec:audio"]
resources.memory  = "32MB"
resources.timeout = "30s"

[actions.export_wav]
description = "Export spoken text to a .wav file via say.export()"
entrypoint  = "say"
permissions = ["exec:audio", "write:file"]
resources.memory  = "32MB"
resources.timeout = "30s"
