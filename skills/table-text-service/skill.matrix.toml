id = "table-text-service"
name = "Windows TableTextService IME Framework"
version = "1.0.0"
description = "Windows Text Input Processor (TIP) table-based IME framework. Hosts four table-driven input method editors registered with the Text Services Framework (TSF): Traditional Chinese Da Yi (大易), Traditional Chinese Array (行列), Tigrinya (Ethiopian Ge'ez), and Yi (彝文 Chinese minority script). The .txt files are INI-style TSF profile configs — they define language ID, COM GUID profile, keymap, candidate list behavior, and font. Use when: inspecting or modifying Windows IME table configs, understanding TSF GUIDs for these input methods, working with CJK/minority script text input in native Windows apps, or registering custom TIP profiles."
category = "tool"
files = false

[env]
dll        = "C:\\Program Files (x86)\\Windows NT\\TableTextService\\TableTextService.dll"
locale_dir = "C:\\Program Files (x86)\\Windows NT\\TableTextService\\en-US"

[ime_profiles]
dayi      = "C:\\Program Files (x86)\\Windows NT\\TableTextService\\TableTextServiceDaYi.txt"
array     = "C:\\Program Files (x86)\\Windows NT\\TableTextService\\TableTextServiceArray.txt"
tigrinya  = "C:\\Program Files (x86)\\Windows NT\\TableTextService\\TableTextServiceTigrinya.txt"
yi        = "C:\\Program Files (x86)\\Windows NT\\TableTextService\\TableTextServiceYi.txt"

[ime_guids]
dayi      = "{037B2C25-480C-4d7f-B027-D6CA6B69788A}"
array     = "{D38EFF65-AA46-4fd5-91A7-67845FB02F5B}"
tigrinya  = "{3CAB88B7-CC3E-46A6-9765-B772AD7761FF}"
yi        = "{409C8376-007B-4357-AE8E-26316EE3FB0D}"

[actions.query_ime]
description = "Describe a specific IME profile — language, GUID, keymap, candidate list config"
entrypoint  = "query"
permissions = ["read:ime"]
resources.memory  = "8MB"
resources.timeout = "1s"

[actions.list_profiles]
description = "List all four registered TIP profiles with their GUIDs and languages"
entrypoint  = "query"
permissions = ["read:ime"]
resources.memory  = "8MB"
resources.timeout = "1s"

[actions.inspect_config]
description = "Read and explain an IME .txt config file (keymap, candidate list, font settings)"
entrypoint  = "query"
permissions = ["read:ime"]
resources.memory  = "8MB"
resources.timeout = "1s"
