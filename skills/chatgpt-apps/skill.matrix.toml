[skill]
name        = "chatgpt-apps"
version     = "1.0.0"
description = "ChatGPT app integration — OpenAI API bridge, GPT action manifests, plugin schema, and assistant thread management"
runtime     = "xcfe"
shard_checkpoint = false

[actions]
create_thread    = { entry = "ChatGptAppsActions.create_thread",    runtime = "xcfe" }
send_message     = { entry = "ChatGptAppsActions.send_message",     runtime = "xcfe" }
list_assistants  = { entry = "ChatGptAppsActions.list_assistants",  runtime = "xcfe" }
build_manifest   = { entry = "ChatGptAppsActions.build_manifest",   runtime = "xcfe" }
run_assistant    = { entry = "ChatGptAppsActions.run_assistant",     runtime = "xcfe" }
