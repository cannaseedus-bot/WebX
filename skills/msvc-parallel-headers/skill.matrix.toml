id = "msvc-parallel-headers"
name = "MSVC 14.29 Parallel Computing Headers (ConcRT / PPL / AMP / OpenMP)"
version = "1.0.0"
description = "MSVC-specific parallel and concurrent programming headers from VC\\Tools\\MSVC\\14.29.30133\\include\\. Not part of the C++ standard library — these are Microsoft extensions. Groups: ConcRT Agents (agents.h — message-passing agents, message blocks, send/receive/asend), PPL (ppl.h — parallel_for/parallel_invoke/parallel_for_each, task_group, structured_task_group; ppltasks.h — task<T> with continuations and cancellation; pplcancellation_token.h; pplawait.h — coroutine integration; pplinterface.h; ppltaskscheduler.h; pplwin.h), Concurrent Collections (concurrent_queue.h, concurrent_vector.h, concurrent_priority_queue.h, concurrent_unordered_map.h, concurrent_unordered_set.h), C++ AMP (amp.h, amp_graphics.h, amp_math.h, amp_short_vectors.h, amprt.h — GPU compute via DirectX; deprecated in VS 2022), OpenMP (omp.h, omp_llvm.h). Use when: writing parallel C++ with MSVC, async task pipelines, lock-free concurrent data structures, GPU compute via AMP, or OpenMP pragmas."
category = "sdk"
files = false

[env]
include_root = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\include"

[headers.concrt_agents]
"agents.h"    = "Main ConcRT agents header — message_block, transformer, call, timer, send/receive/asend"
"concrt.h"    = "ConcRT core — Scheduler, Context, CurrentScheduler, oversubscribe"

[headers.ppl]
"ppl.h"                    = "Parallel Patterns Library — parallel_for, parallel_invoke, task_group"
"ppltasks.h"               = "task<T> with continuations (.then()), cancellation, when_all/when_any"
"pplcancellation_token.h"  = "cancellation_token, cancellation_token_source"
"pplawait.h"               = "PPL coroutine integration (co_await on task<T>)"
"pplinterface.h"           = "IScheduler, IThreadProxy — scheduler extension interfaces"
"ppltaskscheduler.h"       = "task_continuation_context, task scheduler integration"
"pplwin.h"                 = "Windows-specific PPL extensions (IAsyncOperation interop)"

[headers.concurrent_collections]
"concurrent_queue.h"           = "concurrent_queue<T> — lock-free FIFO, try_pop/push"
"concurrent_vector.h"          = "concurrent_vector<T> — append-safe growable array"
"concurrent_priority_queue.h"  = "concurrent_priority_queue<T> — lock-based priority queue"
"concurrent_unordered_map.h"   = "concurrent_unordered_map<K,V> — concurrent hash map"
"concurrent_unordered_set.h"   = "concurrent_unordered_set<T> — concurrent hash set"

[headers.amp]
"amp.h"             = "C++ AMP — array<T,N>, array_view<T,N>, parallel_for_each on GPU"
"amp_graphics.h"    = "C++ AMP graphics — texture<T,N>, writeonly_texture_view"
"amp_math.h"        = "C++ AMP math — restrict(amp) math functions"
"amp_short_vectors.h" = "C++ AMP short vector types (float2, float4, int2, etc.)"
"amprt.h"           = "C++ AMP runtime — accelerator, accelerator_view"
"amprt_exceptions.h" = "C++ AMP exception types"

[headers.openmp]
"omp.h"      = "OpenMP 2.0 runtime API — omp_get_num_threads, omp_set_num_threads, etc."
"omp_llvm.h" = "LLVM OpenMP extensions"

[actions.query]
description = "Explain ConcRT, PPL, concurrent collections, AMP, or OpenMP header APIs"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"
