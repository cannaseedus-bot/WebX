id = "netfx-sdk"
name = ".NET Framework 4.8 SDK"
version = "1.0.0"
description = "Native C++ headers and import libs for hosting, debugging, profiling, and interoperating with the .NET CLR from native code. Version 4.8. Use when native code needs to: spawn or control the CLR (mscoree/metahost), debug managed code from C++ (cordebug), build a .NET profiler (corprof), read/write .NET assembly metadata (cor/corsym), or strong-name sign assemblies."
category = "sdk"
files = false

[env]
root        = "C:\\Program Files (x86)\\Windows Kits\\NETFXSDK\\4.8"
include_um  = "C:\\Program Files (x86)\\Windows Kits\\NETFXSDK\\4.8\\Include\\um"
lib_x64     = "C:\\Program Files (x86)\\Windows Kits\\NETFXSDK\\4.8\\Lib\\um\\x64"
lib_x86     = "C:\\Program Files (x86)\\Windows Kits\\NETFXSDK\\4.8\\Lib\\um\\x86"
lib_arm     = "C:\\Program Files (x86)\\Windows Kits\\NETFXSDK\\4.8\\Lib\\um\\arm"

[key_headers]
mscoree     = "mscoree.h"       # CLR hosting — spawn/control .NET runtime from C++
metahost    = "metahost.h"      # ICLRMetaHost — enumerate/activate CLR versions
cordebug    = "cordebug.h"      # CLR debugging API — attach native debugger to managed code
corprof     = "corprof.h"       # CLR profiling API — APM, code coverage, tracing
cor         = "cor.h"           # Core CLR metadata read/write
corsym      = "corsym.h"        # Symbol store — PDB for .NET assemblies
strongname  = "StrongName.h"    # Strong-name sign .NET assemblies
alink       = "alink.h"         # Assembly linker
clrdata     = "clrdata.h"       # CLR data access (used by WinDbg SOS extension)

[key_libs]
mscoree     = "mscoree.lib"     # Import lib for CLR host activation
corguids    = "corguids.lib"    # GUID definitions for all CLR COM interfaces
mscorsn     = "mscorsn.lib"     # Strong-name signing
format      = "format.lib"      # IL formatter
alink       = "alink.lib"       # Assembly linker
tlbref      = "tlbref.lib"      # Type library reference

[actions.clr_host]
description = "Provide headers and libs for hosting the CLR from native C++ (mscoree + metahost)"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"

[actions.clr_debug]
description = "Provide headers and libs for attaching a native debugger to managed .NET code (cordebug)"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"

[actions.clr_profile]
description = "Provide headers and libs for building a .NET CLR profiler (corprof)"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"
