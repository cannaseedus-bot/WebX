id = "windows-sdk"
name = "Windows SDK 10"
version = "1.0.0"
description = "Windows SDK 10 installation. Two full SDK versions: 10.0.22621.0 (Win11 22H2) and 10.0.26100.0 (Win11 24H2, latest). Provides DirectX 12, DXGI, UCRT, Win32, WinRT, and C++/WinRT headers and libs for x64, x86, and arm64. Primary SDK for AS-XCFE native D3D12/XVM builds."
category = "sdk"
files = false

[env]
root        = "C:\\Program Files (x86)\\Windows Kits\\10"
latest_ver  = "10.0.26100.0"
prev_ver    = "10.0.22621.0"

[env.latest]
include_um     = "C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\um"
include_shared = "C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\shared"
include_ucrt   = "C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\ucrt"
include_winrt  = "C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\winrt"
include_cppwinrt = "C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\cppwinrt"
lib_um_x64     = "C:\\Program Files (x86)\\Windows Kits\\10\\Lib\\10.0.26100.0\\um\\x64"
lib_um_x86     = "C:\\Program Files (x86)\\Windows Kits\\10\\Lib\\10.0.26100.0\\um\\x86"
lib_ucrt_x64   = "C:\\Program Files (x86)\\Windows Kits\\10\\Lib\\10.0.26100.0\\ucrt\\x64"
bin_x64        = "C:\\Program Files (x86)\\Windows Kits\\10\\bin\\10.0.26100.0\\x64"

[key_headers]
# DirectX 12 — in um/
d3d12          = "um/d3d12.h"
d3d12shader    = "um/d3d12shader.h"
d3d12sdklayers = "um/d3d12sdklayers.h"
d3dcompiler    = "um/d3dcompiler.h"
# DXGI — in shared/
dxgi           = "shared/dxgi.h"
dxgi1_6        = "shared/dxgi1_6.h"
dxgiformat     = "shared/dxgiformat.h"
# Win32 — in um/
windows        = "um/windows.h"
# C++/WinRT — in cppwinrt/winrt/
cppwinrt       = "cppwinrt/winrt/"

[actions.resolve_header]
description = "Locate a Windows SDK header file by name across um/, shared/, ucrt/, winrt/"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"

[actions.cmake_flags]
description = "Return CMake WindowsSDKVersion and include/lib path flags for the latest SDK"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"
