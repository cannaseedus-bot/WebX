id = "page-inspector"
name = "Microsoft Web Tools - Page Inspector"
version = "1.0.0"
description = "Minimal remnant of Microsoft Page Inspector — a Visual Studio 2012-2015 era web tool that embedded a browser inspector into VS, enabling bidirectional mapping between rendered HTML/CSS and source files. Only two files remain: the browser-side loader DLL (Microsoft.VisualStudio.Web.PageInspector.Loader.dll) and the EULA. The Loader DLL is injected into the inspected web page to instrument the DOM and report source mappings back to Visual Studio. Not usable standalone — requires the full VS Page Inspector extension to be installed."
category = "tool"
files = false

[env]
root       = "C:\\Program Files (x86)\\Microsoft Web Tools\\Page Inspector"
loader_dll = "C:\\Program Files (x86)\\Microsoft Web Tools\\Page Inspector\\Microsoft.VisualStudio.Web.PageInspector.Loader.dll"
eula       = "C:\\Program Files (x86)\\Microsoft Web Tools\\Page Inspector\\eula.rtf"

[actions.query]
description = "Describe Page Inspector loader DLL purpose and VS integration context"
entrypoint  = "query"
permissions = ["read:tool"]
resources.memory  = "8MB"
resources.timeout = "1s"
