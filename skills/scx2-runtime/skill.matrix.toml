id = "scx2-runtime"
name = "SCX2 Runtime Smoke"
version = "1.0.0"
description = "Native SCX2 runtime smoke test. Validates the SCX2 bytecode interpreter by executing a minimal .scx2 program and checking output parity. Used as a fast health check after native builds."
category = "native-asx"
files = true
binary_root = "artifacts/native-asx"

[actions.smoke]
description = "Run the SCX2 runtime smoke test against a .scx2 bytecode file"
entrypoint = "scx2_runtime_smoke.exe"
permissions = ["read:artifacts"]
resources.memory = "64MB"
resources.timeout = "10s"
