[skill]
name        = "doc"
version     = "1.0.0"
description = "Documentation agent — generate, update, and validate docs: README, API reference, architecture diagrams, CHANGELOG"
runtime     = "xcfe"
shard_checkpoint = false

[actions]
generate_readme  = { entry = "DocActions.generate_readme",   runtime = "xcfe" }
update_api_ref   = { entry = "DocActions.update_api_ref",    runtime = "xcfe" }
write_changelog  = { entry = "DocActions.write_changelog",   runtime = "xcfe" }
draw_diagram     = { entry = "DocActions.draw_diagram",      runtime = "xcfe" }
validate_links   = { entry = "DocActions.validate_links",    runtime = "xcfe" }
