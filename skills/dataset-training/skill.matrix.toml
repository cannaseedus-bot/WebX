[skill]
name        = "dataset-training"
description = "Dataset discovery, manifest generation, and preparation for LoRA-like training runs using the project corpus."
runtime     = "node"
runner      = "../skill-runner.mjs"
version     = "1.0.0"

[actions]
generate_manifest = { entry = "DatasetTrainingActions.generateManifest", runtime = "node", description = "Generate a dataset manifest from the project corpus" }
discover          = { entry = "DatasetTrainingActions.discover",          runtime = "node", description = "Discover available datasets and training artifacts" }
ingest            = { entry = "DatasetTrainingActions.ingest",            runtime = "node", description = "Ingest a dataset source into the training pipeline" }
status            = { entry = "DatasetTrainingActions.status",            runtime = "node", description = "Report current training dataset status and coverage" }
