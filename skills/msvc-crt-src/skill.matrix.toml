id = "msvc-crt-src"
name = "MSVC 14.29 CRT Source Code (crt\\src)"
version = "1.0.0"
description = "Microsoft C Runtime Library source code shipped with MSVC 14.29.30133 (VS 2019). Located at VC\\Tools\\MSVC\\14.29.30133\\crt\\src\\. Sub-trees: concrt\\ (115 files — Concurrency Runtime: agents, PPL, parallel_for, concurrent_queue, concurrent_vector, event, HillClimbing scheduler), stl\\ (153 files — STL implementation: vector, map, string, algorithm, filesystem, ranges), vcruntime\\ (128 files — VC runtime: startup, exception handling, RTTI, SEH, alloca), sanitizer\\ (ASAN/UBSAN/coverage interface headers), vccorlib\\ (WinRT/C++/CX support), i386\\ + x64\\ (architecture-specific assembly). Use when: reading reference implementations of STL or CRT functions, understanding ConcRT scheduler internals (HillClimbing, work-stealing, UMS threads), debugging vcruntime exception handling, or studying the PPL (Parallel Patterns Library) implementation."
category = "reference"
files = false

[env]
root      = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\crt\\src"
concrt    = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\crt\\src\\concrt"
stl       = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\crt\\src\\stl"
vcruntime = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\crt\\src\\vcruntime"
sanitizer = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\crt\\src\\sanitizer"
vccorlib  = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\crt\\src\\vccorlib"

[subtrees]
"concrt"    = "115 files — Concurrency Runtime: PPL, agents, concurrent collections, scheduler"
"stl"       = "153 files — STL: containers, algorithms, iterators, filesystem, ranges"
"vcruntime" = "128 files — VC runtime: startup (mainCRTStartup), exceptions, RTTI, SEH, alloca"
"sanitizer" = "Interface headers for ASAN, UBSAN, coverage, DFSan"
"vccorlib"  = "WinRT/C++/CX runtime support (Platform::Object, ref classes)"
"i386"      = "x86 assembly implementation files"
"x64"       = "x64 assembly implementation files"
"linkopts"  = "Linker option response files"

[concrt_key_files]
"Agent.cpp"             = "agent base class — asynchronous message-passing agent lifecycle"
"ppl.cpp"               = "Parallel Patterns Library — parallel_for, parallel_invoke, task_group"
"concurrent_queue.cpp"  = "Lock-free concurrent_queue implementation"
"concurrent_vector.cpp" = "concurrent_vector — append-safe dynamic array"
"concurrent_hash.cpp"   = "concurrent_unordered_map / concurrent_unordered_set"
"event.cpp"             = "event class — manual/auto-reset synchronization primitive"
"Context.cpp"           = "Scheduler context (fiber/thread abstraction)"
"HillClimbing.cpp"      = "Hill-climbing thread pool auto-tuning algorithm"
"Chores.cpp"            = "Work-stealing task chores"
"rtlocks.cpp"           = "Reader-writer locks for the ConcRT runtime"
"location.cpp"          = "NUMA topology and processor location awareness"

[actions.browse]
description = "Navigate and explain MSVC CRT source code — STL, ConcRT, vcruntime"
entrypoint  = "query"
permissions = ["read:source"]
resources.memory  = "32MB"
resources.timeout = "5s"
