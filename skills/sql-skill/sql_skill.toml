[agent]
name = "sql_agent"
entry = "SqlActions.connect"

[routes]
"connect" = "SqlActions.connect"
"list_tables" = "SqlActions.listTables"
"describe_table" = "SqlActions.describeTable"
"query" = "SqlActions.query"
"upsert" = "SqlActions.upsert"

[skill]
name = "sql_skill"
entry = "SqlActions.connect"

[tools]
code = true

[runtime]
dataRoot = "./config"
