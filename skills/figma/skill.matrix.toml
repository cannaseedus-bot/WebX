[skill]
name        = "figma"
version     = "1.0.0"
description = "Figma API agent — read frames, export assets, inspect tokens, extract component specs and auto-layout data"
runtime     = "xcfe"
shard_checkpoint = false

[actions]
get_file         = { entry = "FigmaActions.get_file",         runtime = "xcfe" }
export_assets    = { entry = "FigmaActions.export_assets",    runtime = "xcfe" }
list_components  = { entry = "FigmaActions.list_components",  runtime = "xcfe" }
get_tokens       = { entry = "FigmaActions.get_tokens",       runtime = "xcfe" }
inspect_frame    = { entry = "FigmaActions.inspect_frame",    runtime = "xcfe" }
get_styles       = { entry = "FigmaActions.get_styles",       runtime = "xcfe" }
