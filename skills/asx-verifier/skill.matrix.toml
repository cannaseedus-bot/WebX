id = "asx-verifier"
name = "ASX Verifier"
version = "1.0.0"
description = "Native ASX module envelope verifier. Checks that an ASX module's capability manifest matches its actual imports, exports, and effects declarations. Produces pass/fail with detailed constraint violations."
category = "native-asx"
files = true
binary_root = "artifacts/native-asx"

[actions.verify]
description = "Verify an ASX module envelope against its capability and determinism constraints"
entrypoint = "asx_verifier.exe"
permissions = ["read:artifacts"]
resources.memory = "64MB"
resources.timeout = "10s"

[actions.verify_bad]
description = "Verify a known-bad ASX module and assert expected constraint violations (negative test)"
entrypoint = "asx_verifier.exe"
permissions = ["read:artifacts"]
resources.memory = "64MB"
resources.timeout = "10s"
