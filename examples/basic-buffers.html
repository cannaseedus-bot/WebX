<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
        COOP/COEP headers required for SharedArrayBuffer.
        In production, set these on your server:
          Cross-Origin-Opener-Policy: same-origin
          Cross-Origin-Embedder-Policy: require-corp
    -->
    <title>D12WebX – GPU Buffer Basics</title>
    <style>
        body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 2rem; }
        h1   { color: #58a6ff; }
        h2   { color: #79c0ff; margin-top: 1.5rem; }
        pre  { background: #161b22; border: 1px solid #30363d; padding: 1rem; border-radius: 6px; overflow-x: auto; }
        .ok  { color: #3fb950; }
        .err { color: #f85149; }
        .dim { color: #8b949e; }
    </style>
</head>
<body>
    <h1>D12WebX – GPU Buffer Basics</h1>
    <p class="dim">SharedArrayBuffer + Atomics for zero-copy, lock-free GPU memory access.</p>

    <h2>1. Allocate GPU Buffer</h2>
    <pre id="out-alloc">Running…</pre>

    <h2>2. Write &amp; Read (Zero-Copy)</h2>
    <pre id="out-rw">Running…</pre>

    <h2>3. Fence Synchronization (Atomics)</h2>
    <pre id="out-fence">Running…</pre>

    <h2>4. Compute Dispatch</h2>
    <pre id="out-dispatch">Running…</pre>

    <script type="module">
        // ── Inline polyfill of D12WebX for standalone demo ──────────────────
        // In production: import { D12WebX, GPU_FLAGS } from 'd12webx';

        const GPU_FLAGS = { UAV: 0x8, SRV: 0x4, CBV: 0x2, COPY_SRC: 0x1, COPY_DST: 0x10 };

        class GPUMemoryAllocator {
            constructor(size) {
                this.size = size;
                this.buffer = new SharedArrayBuffer(size);
                this.view = new Uint8Array(this.buffer);
                this.allocated = 0;
            }
            allocate(size) {
                if (this.allocated + size > this.size) throw new Error('Out of GPU memory');
                const start = this.allocated;
                this.allocated += size;
                return this.view.subarray(start, start + size);
            }
            deallocate(size) { this.allocated = Math.max(0, this.allocated - size); }
            getBuffer() { return this.buffer; }
        }

        class D12WebX {
            constructor(heapSize = 64 * 1024 * 1024) {
                this._allocator = new GPUMemoryAllocator(heapSize);
                this._buffers = new Map();
                this._idCounter = 0;
            }
            createBuffer(size, flags = GPU_FLAGS.UAV) {
                const region = this._allocator.allocate(size);
                const id = ++this._idCounter;
                const buf = {
                    id, size, flags,
                    offset: region.byteOffset,
                    view: new Float32Array(this._allocator.getBuffer(), region.byteOffset, size / 4),
                };
                this._buffers.set(id, buf);
                return buf;
            }
            createFence() {
                const sab = new SharedArrayBuffer(8);
                const view = new BigInt64Array(sab);
                return {
                    view,
                    signal: () => Atomics.store(view, 0, 1n),
                    // waitAsync is safe on the main browser thread; use Atomics.wait only in Workers
                    waitAsync: (ms = 100) => Atomics.waitAsync(view, 0, 0n, ms),
                };
            }
            writeBuffer(buf, data) { buf.view.set(data); }
            readBuffer(buf)        { return new Float32Array(buf.view); }
            async executeParallel(cmdLists) {
                return cmdLists.map(cmds => cmds.map(c => ({ ...c, executedAt: performance.now() })));
            }
        }
        // ── End polyfill ──────────────────────────────────────────────────────

        function log(id, text) { document.getElementById(id).textContent = text; }

        // 1. Allocate
        try {
            const gpu = new D12WebX(16 * 1024 * 1024); // 16 MB heap
            const buf = gpu.createBuffer(65536, GPU_FLAGS.UAV);
            log('out-alloc',
                `✅ Buffer created\n` +
                `   id      : ${buf.id}\n` +
                `   size    : ${buf.size.toLocaleString()} bytes\n` +
                `   flags   : 0x${buf.flags.toString(16).toUpperCase()} (UAV)\n` +
                `   offset  : ${buf.offset} bytes into SharedArrayBuffer`
            );

            // 2. Write & read
            const payload = new Float32Array(16).map((_, i) => i * 1.5);
            gpu.writeBuffer(buf, payload);
            const readback = gpu.readBuffer(buf).subarray(0, 16);
            log('out-rw',
                `✅ Zero-copy write → read\n` +
                `   Written : [${Array.from(payload).join(', ')}]\n` +
                `   Read    : [${Array.from(readback).join(', ')}]\n` +
                `   Match   : ${payload.every((v, i) => v === readback[i]) ? '✅ identical' : '❌ mismatch'}`
            );

            // 3. Fence sync
            const fence = gpu.createFence();
            const before = Atomics.load(fence.view, 0);
            fence.signal();
            const after = Atomics.load(fence.view, 0);
            // Atomics.waitAsync is safe on the main thread (Atomics.wait is for Workers only)
            const waitResult = Atomics.waitAsync
                ? (await Atomics.waitAsync(fence.view, 0, after, 0).value)
                : 'not-equal (already signalled)';
            log('out-fence',
                `✅ Fence synchronization\n` +
                `   Before signal : ${before}\n` +
                `   After signal  : ${after}\n` +
                `   waitAsync     : ${waitResult}`
            );

            // 4. Dispatch
            const t0 = performance.now();
            await gpu.executeParallel([[
                { type: 'dispatch', x: 32, y: 32, z: 1, threads: 1024 },
                { type: 'dispatch', x: 64, y: 16, z: 1, threads: 1024 },
            ]]);
            const elapsed = (performance.now() - t0).toFixed(3);
            log('out-dispatch',
                `✅ Parallel compute dispatch\n` +
                `   Command lists : 1\n` +
                `   Commands      : 2 × dispatch (1 024 threads each)\n` +
                `   Total threads : 2 048\n` +
                `   Wall time     : ${elapsed} ms`
            );
        } catch (err) {
            ['out-alloc','out-rw','out-fence','out-dispatch'].forEach(id => {
                if (document.getElementById(id).textContent === 'Running…')
                    document.getElementById(id).textContent = `❌ ${err.message}`;
            });
            console.error(err);
        }
    </script>
</body>
</html>
