<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K'UHUL++ Basic Execution Demo</title>
  <style>
    body { font-family: monospace; background: #0d0d0d; color: #e0e0e0; margin: 0; padding: 20px; }
    h1   { color: #a78bfa; margin-bottom: 4px; }
    h2   { color: #818cf8; margin-top: 24px; }
    #editor  { width: 100%; height: 180px; background: #1e1b4b; color: #c4b5fd;
               border: 1px solid #4338ca; border-radius: 6px; padding: 10px;
               font-family: monospace; font-size: 14px; resize: vertical; }
    #runBtn  { background: #4f46e5; color: white; border: none; padding: 8px 20px;
               border-radius: 4px; cursor: pointer; font-size: 14px; margin-top: 8px; }
    #runBtn:hover { background: #4338ca; }
    #output  { background: #1e1b4b; border: 1px solid #3730a3; border-radius: 6px;
               padding: 12px; margin-top: 12px; min-height: 60px; white-space: pre-wrap; }
    .ok  { color: #34d399; }
    .err { color: #f87171; }
    .info{ color: #93c5fd; }
  </style>
</head>
<body>
  <h1>K'UHUL++ Basic Execution</h1>
  <p class="info">Edit the K'UHUL++ source below and click <strong>Run</strong>.</p>
  <textarea id="editor">// Hello World in K'UHUL++
Tensor message = "Hello, KUHUL World!";
Tensor pi_val  = 0.5π;
Tensor vec     = [1.0, 2.0, 3.0];
Tensor bias    = [0.1, 0.2, 0.3];
Tensor result  = vec ⊕ bias;</textarea>
  <br />
  <button id="runBtn">▶ Run</button>
  <h2>Output</h2>
  <div id="output"><span class="info">Click Run to execute...</span></div>
  <script type="module">
    async function loadEngine() {
      try {
        const { ExecutionEngine } = await import('../../kuhul/runtime/execution-engine.js');
        return new ExecutionEngine({ strictMode: false });
      } catch (e) { return null; }
    }
    const out = document.getElementById('output');
    function write(text, cls = '') {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = text + '\n';
      out.appendChild(span);
    }
    document.getElementById('runBtn').addEventListener('click', async () => {
      out.innerHTML = '';
      const source = document.getElementById('editor').value;
      const engine = await loadEngine();
      if (!engine) {
        write('Build the project first (npm run build) to use the execution engine.', 'err');
        write(`Source length: ${source.length} chars`, 'info');
        return;
      }
      try {
        const t0 = performance.now();
        const result = await engine.run(source);
        const ms = (performance.now() - t0).toFixed(1);
        write('Execution complete in ' + ms + 'ms', 'ok');
        write('Phase: ' + result.phase.toFixed(4) + ' rad', 'ok');
        write('Memory entries: ' + result.output.size, 'ok');
        write('');
        write('Pipeline log:', 'info');
        for (const line of result.log) write('  ' + line, 'info');
      } catch (e) {
        write('Error: ' + e.message, 'err');
      }
    });
  </script>
</body>
</html>
