id = "vs-native-tools"
name = "VS Native Tools"
version = "1.1.0"
description = "Visual Studio 2026 Build Tools VC command prompt bootstrap. Initialises the correct MSVC environment for a given target architecture before invoking cl.exe, link.exe, or cmake. Install root: C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools"
category = "compiler"
files = false

[env]
vs_build_tools = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools"
vc_aux_build   = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\VC\\Auxiliary\\Build"

[actions.x64]
description = "Bootstrap 64-bit native MSVC environment (vcvars64.bat) — use for all AS-XCFE native builds"
entrypoint = "command"
bat = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat"
permissions = ["read:env", "exec:cmd"]
resources.memory = "32MB"
resources.timeout = "10s"

[actions.x86]
description = "Bootstrap 32-bit native MSVC environment (vcvars32.bat)"
entrypoint = "command"
bat = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\VC\\Auxiliary\\Build\\vcvars32.bat"
permissions = ["read:env", "exec:cmd"]
resources.memory = "32MB"
resources.timeout = "10s"

[actions.x86_x64]
description = "Bootstrap cross-compile environment: 32-bit host → 64-bit target (vcvarsx86_amd64.bat)"
entrypoint = "command"
bat = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\VC\\Auxiliary\\Build\\vcvarsx86_amd64.bat"
permissions = ["read:env", "exec:cmd"]
resources.memory = "32MB"
resources.timeout = "10s"

[actions.x64_x86]
description = "Bootstrap cross-compile environment: 64-bit host → 32-bit target (vcvarsamd64_x86.bat)"
entrypoint = "command"
bat = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\VC\\Auxiliary\\Build\\vcvarsamd64_x86.bat"
permissions = ["read:env", "exec:cmd"]
resources.memory = "32MB"
resources.timeout = "10s"
