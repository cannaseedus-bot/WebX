id = "msodbcsql"
name = "ODBC Driver 18 for SQL Server"
version = "1.0.0"
description = "Microsoft ODBC Driver 18 SDK — connection attrs, BCP, Always Encrypted, AAD auth, SQL Server types"
category = "native-sql"
files = true
runtime = "xcfe"
sdk_header = "C:/Program Files (x86)/Microsoft SQL Server/Client SDK/ODBC/180/SDK/Include/msodbcsql.h"

[actions.connect]
description = "Open an ODBC connection to SQL Server via msodbcsql18.dll"
entrypoint = "connect"
permissions = ["exec:odbc", "read:credentials"]
resources.memory = "64MB"
resources.timeout = "10s"

[actions.bcp_pack]
description = "Bulk-copy rows into SQL Server; produces checkpoint shard metadata"
entrypoint = "bcp_pack"
permissions = ["exec:odbc", "write:artifacts"]
resources.memory = "512MB"
resources.timeout = "120s"
shard_checkpoint = true

[actions.always_encrypted]
description = "Configure Always Encrypted keystore provider on connection"
entrypoint = "always_encrypted"
permissions = ["exec:odbc", "read:credentials"]
resources.memory = "64MB"
resources.timeout = "10s"

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"
