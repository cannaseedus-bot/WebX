[skill]
name        = "sql-skill"
version     = "1.0.0"
description = "SQL skill — query generation, schema inspection, migration scripts, query explain/optimize across MSSQL/SQLite/Postgres"
runtime     = "xcfe"
shard_checkpoint = true

[actions]
generate_query   = { entry = "SqlSkillActions.generate_query",   runtime = "xcfe" }
inspect_schema   = { entry = "SqlSkillActions.inspect_schema",   runtime = "xcfe" }
write_migration  = { entry = "SqlSkillActions.write_migration",  runtime = "xcfe" }
explain_query    = { entry = "SqlSkillActions.explain_query",    runtime = "xcfe" }
optimize_query   = { entry = "SqlSkillActions.optimize_query",   runtime = "xcfe" }
pack_shard       = { entry = "SqlSkillActions.pack_shard",       runtime = "xcfe" }

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"
