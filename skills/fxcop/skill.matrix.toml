id = "fxcop"
name = "FxCop & MSVC Code Analysis (VS 2019 BuildTools)"
version = "1.0.0"
description = "FxCop managed code analysis tool and MSVC C++ static analysis headers, installed under VS 2019 BuildTools Team Tools. FxCop (FxCopCmd.exe) analyzes .NET assemblies against rule sets for design, naming, security, performance, reliability, globalization, interoperability, and maintainability violations. Uses Phoenix analysis engine (phx.dll + PhoenixAnalysisEngine.dll) and CCI metadata reader (Microsoft.Cci.dll). Rules are in DLLs under Rules\\: DesignRules, NamingRules, SecurityRules, PerformanceRules, ReliabilityRules, UsageRules, DataflowRules, GlobalizationRules, InteroperabilityRules, MaintainabilityRules, MobilityRules, PortabilityRules, SecurityTransparencyRules. MSVC CodeAnalysis headers: include\\CodeAnalysis\\sourceannotations.h (SAL-like __declspec annotations for C++ code analysis) and Warnings.h (C++ code analysis warning IDs). NativeCodeAnalysis.dll and ManagedSourceCodeAnalysis.dll are the VS-integrated analysis engines called by MSBuild /analyze. Use when: running FxCop on .NET assemblies, customizing code analysis rule sets, using SAL annotations on C++ code, or suppressing specific code analysis warnings."
category = "tool"
files = false

[env]
fxcop_root     = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\Team Tools\\Static Analysis Tools\\FxCop"
fxcopcmd       = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\Team Tools\\Static Analysis Tools\\FxCop\\FxCopCmd.exe"
native_analysis = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\Team Tools\\Static Analysis Tools\\NativeCodeAnalysis.dll"
managed_analysis = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\Team Tools\\Static Analysis Tools\\ManagedSourceCodeAnalysis.dll"
code_analysis_include = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\include\\CodeAnalysis"

[fxcop_rules]
"DesignRules.dll"             = "API design guidelines (CA1xxx)"
"NamingRules.dll"             = "Naming conventions (CA1700-CA1799)"
"SecurityRules.dll"           = "Security vulnerabilities (CA2100-CA2153)"
"PerformanceRules.dll"        = "Performance issues (CA1800-CA1899)"
"ReliabilityRules.dll"        = "Reliability/correctness (CA2000-CA2099)"
"UsageRules.dll"              = "API usage patterns (CA2200-CA2243)"
"DataflowRules.dll"           = "Dataflow-based security (SQL injection, XSS)"
"GlobalizationRules.dll"      = "Globalization/localization (CA1300-CA1399)"
"InteroperabilityRules.dll"   = "COM/P-Invoke interop (CA1400-CA1499)"
"MaintainabilityRules.dll"    = "Code maintainability (CA1500-CA1599)"
"MobilityRules.dll"           = "Power/device mobility (CA1600-CA1699)"
"PortabilityRules.dll"        = "Platform portability (CA1900-CA1999)"
"SecurityTransparencyRules.dll" = "Security transparency model (CA2140-CA2151)"

[codeanalysis_headers]
"sourceannotations.h" = "SAL-like C++ __declspec annotations for /analyze — _In_, _Out_, _Inout_, _In_reads_, etc."
"Warnings.h"          = "C++ code analysis warning IDs — use with #pragma warning(disable:) or suppress attributes"

[actions.run_fxcop]
description = "Run FxCopCmd.exe on a .NET assembly with specified rule sets"
entrypoint  = "FxCopCmd.exe"
permissions = ["exec:tool", "read:assembly"]
resources.memory  = "256MB"
resources.timeout = "120s"

[actions.query_rules]
description = "Look up a specific FxCop rule (CA number) — description, violation examples, fixes"
entrypoint  = "query"
permissions = ["read:tool"]
resources.memory  = "16MB"
resources.timeout = "2s"

[actions.sal_annotations]
description = "Explain SAL C++ annotations from sourceannotations.h for /analyze static analysis"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"
