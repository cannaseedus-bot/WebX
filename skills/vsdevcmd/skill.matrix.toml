id = "vsdevcmd"
name = "VS 2022 BuildTools Developer Environment (VsDevCmd / VsDevShell)"
version = "1.0.0"
description = "VS 2022 BuildTools developer command prompt and shell environment initialization system. Located at Common7\\Tools\\. Initializes PATH, LIB, INCLUDE, LIBPATH and all VS/MSBuild/Windows SDK environment variables for command-line builds. Entry points: VsDevCmd.bat (full dev environment, cmd.exe), VsMSBuildCmd.bat (MSBuild-only lighter variant), LaunchDevCmd.bat (opens new cmd window with dev env), Launch-VsDevShell.ps1 (PowerShell DevShell via Microsoft.VisualStudio.DevShell.dll). Component scripts in vsdevcmd\\core\\: vsdevcmd_start.bat (pre-init), vsdevcmd_end.bat (post-init validation), parse_cmd.bat (arg parsing), winsdk.bat (Windows SDK env), dotnet.bat (.NET SDK env), msbuild.bat (MSBuild PATH). Extensions in vsdevcmd\\ext\\: netfxsdk.bat (.NET Framework SDK), roslyn.bat (Roslyn compiler). vsn.exe (v17.0.36906.2) reports the VS installation version number. Use when: setting up a clean build environment, scripting CI/CD with VS tools, or diagnosing 'cl.exe not found' / 'msbuild not on PATH' issues."
category = "tool"
files = false

[env]
root              = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\Tools"
vsdevcmd_bat      = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\Tools\\VsDevCmd.bat"
vsmsbuildcmd_bat  = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\Tools\\VsMSBuildCmd.bat"
launchdevcmd_bat  = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\Tools\\LaunchDevCmd.bat"
launch_devshell   = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\Tools\\Launch-VsDevShell.ps1"
devshell_dll      = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll"
vsn_exe           = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\IDE\\vsn.exe"

[versions]
vs_build_tools = "17.0.36906.2"

[vsdevcmd_core]
"vsdevcmd_start.bat"  = "Saves pre-init env state, sets up debug logging"
"vsdevcmd_end.bat"    = "Validates init success, sets VSCMD_VER"
"parse_cmd.bat"       = "Parses -arch=, -host_arch=, -app_platform=, -winsdk= args"
"winsdk.bat"          = "Sets WindowsSdkDir, WindowsSDKVersion, adds SDK bin to PATH"
"dotnet.bat"          = "Sets DOTNET_ROOT, adds dotnet.exe to PATH"
"msbuild.bat"         = "Adds MSBuild\\Current\\Bin to PATH"

[vsdevcmd_ext]
"netfxsdk.bat"  = "Sets NETFXSDKDir, adds NETFXSDK headers/libs to INCLUDE/LIB"
"roslyn.bat"    = "Adds Roslyn compiler (csc.exe, vbc.exe) to PATH"

[actions.setup_env]
description = "Provide the correct VsDevCmd.bat invocation to initialize the VS 2022 build environment"
entrypoint  = "query"
permissions = ["read:tool"]
resources.memory  = "16MB"
resources.timeout = "2s"

[actions.debug_env]
description = "Diagnose missing cl.exe, msbuild, or SDK env vars after VsDevCmd initialization"
entrypoint  = "query"
permissions = ["read:tool"]
resources.memory  = "16MB"
resources.timeout = "2s"
