[skill]
name        = "matrix-sandbox"
version     = "2.0.0"
description = "MATRIX unified runtime — JSON + Execution. Parse .matrix source, execute via matrix.exe, compile to matrix.wasm, validate against matrix.ebnf. Sandboxed skill mutation and evolutionary cycles."
runtime     = "matrix.exe"
shard_checkpoint = true

# Parse .matrix source → AST (via matrix.py, validates against matrix.ebnf)
[actions.parse]
entry       = "MatrixActions.parse"
runtime     = "matrix.py"
description = "Parse .matrix source into AST; validate against matrix.ebnf grammar"
resources   = { memory = "64MB", timeout = "5s", network = false, filesystem = "readonly" }

# Execute MATRIX AST → result (via matrix.exe, deterministic native runtime)
[actions.execute]
entry       = "MatrixActions.execute"
runtime     = "matrix.exe"
description = "Deterministic native execution of MATRIX AST or bytecode"
resources   = { memory = "256MB", timeout = "30s", network = false, filesystem = "readonly" }

# Compile MATRIX AST → WebAssembly (via matrix.wasm)
[actions.compile]
entry       = "MatrixActions.compile"
runtime     = "matrix.wasm"
description = "Compile MATRIX AST to WebAssembly module (cross-platform, browser-compatible)"
resources   = { memory = "128MB", timeout = "20s", network = false, filesystem = "none" }

# Validate source against matrix.ebnf (grammar-only check, no execution)
[actions.validate_grammar]
entry       = "MatrixActions.validate_grammar"
runtime     = "matrix.exe"
description = "Validate .matrix source strictly against matrix.ebnf — no execution"
resources   = { memory = "32MB", timeout = "3s", network = false, filesystem = "none" }

# Sandboxed execution (untrusted code, air-gapped)
[actions.sandboxed_execution]
entry       = "MatrixActions.sandboxed_execution"
runtime     = "matrix.exe"
description = "Execute untrusted MATRIX code with policy guards (air-gapped, no filesystem)"
permissions = ["sandbox:execute"]
resources   = { memory = "256MB", timeout = "30s", network = false, filesystem = "none" }

# Skill mutation (single-op, throttled)
[actions.mutate_skill]
entry       = "MatrixActions.mutate_skill"
runtime     = "matrix.exe"
description = "Mutate MATRIX skill definition under throttled policy (single-op bit-flip or ±1)"
permissions = ["sandbox:execute"]
resources   = { memory = "128MB", timeout = "10s", network = false, filesystem = "readonly" }

# Evolutionary cycle (generate → evaluate → select → repeat)
[actions.evolve_skill]
entry       = "MatrixActions.evolve_skill"
runtime     = "matrix.exe"
description = "Evolutionary cycle over skill variants; returns top-K by fitness score"
permissions = ["sandbox:execute"]
resources   = { memory = "256MB", timeout = "45s", network = false, filesystem = "readonly" }

# Pack execution trace as SCXQDDS shard for training
[actions.pack_shard]
entry       = "MatrixActions.pack_shard"
runtime     = "matrix.exe"
description = "Serialize MATRIX execution trace into SCXQDDS INT8 tensor shard"
resources   = { memory = "128MB", timeout = "15s", network = false, filesystem = "readwrite" }

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"

[grammar]
ebnf    = "matrix.ebnf"
version = "2.0"
law     = true   # all implementations must conform

[layers]
parser   = "matrix.py"
runtime  = "matrix.exe"
compiler = "matrix.wasm"
grammar  = "matrix.ebnf"
