[skill]
name        = "workflow-orchestrator"
version     = "1.0.0"
description = "Workflow orchestrator — multi-phase project planning, task decomposition, dependency analysis, automation scaffolding"
runtime     = "xcfe"
shard_checkpoint = true

[actions]
plan_project     = { entry = "WorkflowOrchestratorActions.plan_project",     runtime = "xcfe" }
decompose_tasks  = { entry = "WorkflowOrchestratorActions.decompose_tasks",  runtime = "xcfe" }
analyze_scope    = { entry = "WorkflowOrchestratorActions.analyze_scope",    runtime = "xcfe" }
create_phases    = { entry = "WorkflowOrchestratorActions.create_phases",    runtime = "xcfe" }
generate_todo    = { entry = "WorkflowOrchestratorActions.generate_todo",    runtime = "xcfe" }
scaffold_app     = { entry = "WorkflowOrchestratorActions.scaffold_app",     runtime = "xcfe" }
pack_shard       = { entry = "WorkflowOrchestratorActions.pack_shard",       runtime = "xcfe" }

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"
