id = "snipping-tool"
name = "Snipping Tool (Win32 GDI screen capture)"
version = "1.0.0"
description = "Screen capture for agent visual observation. Two paths: (1) Human-facing — Snipping Tool GUI at C:\\Windows\\System32\\SnippingTool.exe (interactive, freeform/rectangular/window/fullscreen modes, annotate + save). (2) Programmatic agent path — Win32 GDI BitBlt captures primary monitor to BMP; pixel-variance entropy scores the image as a proxy fitness signal (visual_obs.cpp in evolution/). Agents whose genome contains OP_SNAP_SCREEN (0x42) trigger path 2 automatically during fitness evaluation. Output BMP lands in evolution/snap_agent_<id>.bmp. For PNG output from scripts use PowerShell CopyFromScreen."
category = "tool"
files = false

[binary]
path    = "C:\\Windows\\System32\\SnippingTool.exe"
mode    = "interactive"
note    = "No clean headless/CLI interface — use Win32 GDI BitBlt or PowerShell for programmatic capture"

[programmatic_capture]
method     = "Win32 GDI BitBlt"
source     = "evolution/visual_obs.cpp"
output     = "evolution/snap_agent_<id>.bmp"
format     = "BMP 24-bit, top-down scanlines (biHeight negative)"
score_fn   = "pixel-variance entropy / 16256 → [0.0, 1.0]"
fitness_fn = "visual_fitness(agent) → score * 0.1f (max 0.1 bonus)"
opcode     = "OP_SNAP_SCREEN = 0x42"

[powershell_capture]
description = "PNG capture via .NET System.Drawing (no extra dependencies)"
example     = """
Add-Type -AssemblyName System.Windows.Forms
Add-Type -AssemblyName System.Drawing
$bmp = New-Object System.Drawing.Bitmap([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width,
                                         [System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
$g = [System.Drawing.Graphics]::FromImage($bmp)
$g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
$bmp.Save('C:\\snap.png')
"""

[snipping_tool_modes]
free       = "Freeform snip — draw any shape"
rect       = "Rectangular snip (default)"
window     = "Window snip — captures a single window"
fullscreen = "Full-screen snip"

[actions.capture_bmp]
description = "Capture primary monitor to BMP via Win32 GDI (used by evolution engine)"
entrypoint  = "visual_obs.cpp::capture_screenshot"
permissions = ["exec:screen_capture", "write:file"]
resources.memory  = "varies (screen resolution × 3 bytes)"
resources.timeout = "2s"

[actions.score_bmp]
description = "Score a BMP by pixel-variance entropy → [0.0, 1.0]"
entrypoint  = "visual_obs.cpp::score_screenshot"
permissions = ["read:file"]
resources.memory  = "32MB"
resources.timeout = "5s"
