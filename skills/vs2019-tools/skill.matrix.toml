id = "vs2019-tools"
name = "VS 2019 Developer Tools"
version = "1.0.0"
description = "Visual Studio 2019 BuildTools developer environment bootstrap (BuildTools-only install, no Community IDE). Covers Developer PowerShell (Enter-VsDevShell), Developer Command Prompt (VsDevCmd.bat), and all four VC architecture variants (x64, x86, x86_x64, x64_x86)."
category = "compiler"
files = false

[env]
root         = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools"
devshell_dll = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll"
vsdevcmd     = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\Common7\\Tools\\VsDevCmd.bat"
vc_aux_build = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Auxiliary\\Build"
instance_id  = "f73c8dde"

[actions.devshell]
description = "Enter VS 2019 BuildTools Developer PowerShell (Enter-VsDevShell f73c8dde)"
entrypoint   = "powershell"
permissions  = ["read:env", "exec:powershell"]
resources.memory  = "64MB"
resources.timeout = "15s"

[actions.devcmd]
description = "Open VS 2019 BuildTools Developer Command Prompt (VsDevCmd.bat)"
entrypoint   = "cmd"
permissions  = ["read:env", "exec:cmd"]
resources.memory  = "32MB"
resources.timeout = "10s"

[actions.x64]
description = "Bootstrap 64-bit native MSVC 2019 environment (vcvars64.bat)"
entrypoint   = "cmd"
bat          = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat"
permissions  = ["read:env", "exec:cmd"]
resources.memory  = "32MB"
resources.timeout = "10s"

[actions.x86]
description = "Bootstrap 32-bit native MSVC 2019 environment (vcvars32.bat)"
entrypoint   = "cmd"
bat          = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Auxiliary\\Build\\vcvars32.bat"
permissions  = ["read:env", "exec:cmd"]
resources.memory  = "32MB"
resources.timeout = "10s"

[actions.x86_x64]
description = "Bootstrap cross-compile MSVC 2019: 32-bit host → 64-bit target (vcvarsx86_amd64.bat)"
entrypoint   = "cmd"
bat          = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Auxiliary\\Build\\vcvarsx86_amd64.bat"
permissions  = ["read:env", "exec:cmd"]
resources.memory  = "32MB"
resources.timeout = "10s"

[actions.x64_x86]
description = "Bootstrap cross-compile MSVC 2019: 64-bit host → 32-bit target (vcvarsamd64_x86.bat)"
entrypoint   = "cmd"
bat          = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Auxiliary\\Build\\vcvarsamd64_x86.bat"
permissions  = ["read:env", "exec:cmd"]
resources.memory  = "32MB"
resources.timeout = "10s"
