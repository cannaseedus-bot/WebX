[agent]
name = "micronaut_agent"
entry = "MicronautActions.startProject"

[routes]
"init" = "MicronautActions.startProject"
"configure" = "MicronautActions.configureEndpoint"
"secure" = "MicronautActions.secureEndpoint"
"inject" = "MicronautActions.injectBean"
"schedule" = "MicronautActions.scheduleTask"
"event" = "MicronautActions.eventBridge"
"tool_di_resolve" = "MicronautActions.toolDiResolve"
"tool_di_inject" = "MicronautActions.toolDiInject"
"tool_state_get" = "MicronautActions.toolStateGet"
"tool_state_set" = "MicronautActions.toolStateSet"
"tool_schedule_task" = "MicronautActions.toolScheduleTask"
"tool_event_emit" = "MicronautActions.toolEventEmit"
"tool_runtime_step" = "MicronautActions.toolRuntimeStep"
"tool_runtime_run" = "MicronautActions.toolRuntimeRun"
"tool_cluster_migrate" = "MicronautActions.toolClusterMigrate"
"tool_cluster_replicate" = "MicronautActions.toolClusterReplicate"

[skill]
name = "micronaut_skill"
entry = "MicronautActions.startProject"

[tools]
code = true
model = true

[handler]
mode = "hybrid"
backend = "manifest"
manifestPath = "../../../model/manifest.json"
preferGta1 = false

[runtime]
dataRoot = "./config"
