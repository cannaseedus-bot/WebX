id = "msbuild-pkgdef"
name = "MSBuild VS Package Definitions (CommonExtensions/MSBuild)"
version = "1.0.0"
description = "VS 2022 BuildTools package definition (.pkgdef) files for MSBuild assembly binding redirects. Located at Common7\\IDE\\CommonExtensions\\MSBuild\\. These files register assembly binding redirections in the VS IDE runtime, ensuring that any VS extension or MSBuild task that references old Microsoft.Build assembly versions (0.0.0.0-99.9.9.9) gets redirected to the current MSBuild 17.x assemblies at MSBuild\\Current\\Bin\\. Files: Microsoft.Build.pkgdef, Microsoft.Build.Framework.pkgdef, Microsoft.Build.Tasks.Core.pkgdef, Microsoft.Build.Utilities.Core.pkgdef, StringTools.pkgdef, System.Resources.Extensions.pkgdef. MSBuild.clientenabledpkg is a flag file that lists which pkgdef files to activate for MSBuild client/server mode. Not directly invoked — loaded by devenv.exe / the VS package loader at IDE startup."
category = "sdk"
files = false

[env]
root = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\IDE\\CommonExtensions\\MSBuild"

[pkgdef_files]
"Microsoft.Build.pkgdef"               = "Binding redirect for Microsoft.Build.dll → MSBuild\\Current\\Bin\\"
"Microsoft.Build.Framework.pkgdef"     = "Binding redirect for Microsoft.Build.Framework.dll"
"Microsoft.Build.Tasks.Core.pkgdef"    = "Binding redirect for Microsoft.Build.Tasks.Core.dll"
"Microsoft.Build.Utilities.Core.pkgdef" = "Binding redirect for Microsoft.Build.Utilities.Core.dll"
"StringTools.pkgdef"                   = "Binding redirect for StringTools.dll"
"System.Resources.Extensions.pkgdef"  = "Binding redirect for System.Resources.Extensions.dll"
"MSBuild.clientenabledpkg"             = "Flag file: lists pkgdef files activated for MSBuild client/server mode"

[actions.query]
description = "Explain MSBuild pkgdef assembly binding redirect format and VS package loading"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "8MB"
resources.timeout = "1s"
