[skill]
name        = "micronaut-model"
version     = "1.0.0"
description = "Factory for micronaut micro-models in the xjson model system. Scaffolds .xjson definitions, weight backends (local GGUF/SCXQDDS, API stream, HuggingFace OSS), model-specific bots.py, and registry entries. Use when defining a new model, choosing a weight backend, generating bots.py, or registering in model_api_registry.json and micronaut.registry.xjson."
runtime     = "python.exe"
category    = "model-factory"

# ── Query / Info Actions ──────────────────────────────────────────────────────

[actions.backends]
entry       = "MicronautModelActions.backends"
runtime     = "xcfe"
description = "List all 7 supported weight backends with field schemas and selection guide: local_gguf, local_scxqdds, fetch_oss, api_openai, api_anthropic, api_ollama, api_custom."
resources   = { memory = "8MB", timeout = "1s", network = false, filesystem = "none" }

[actions.catalog]
entry       = "MicronautModelActions.catalog"
runtime     = "xcfe"
description = "Return the OSS weight catalog: 10 tested HuggingFace repos with license, recommended GGUF file, architecture params (layers/hidden/vocab), and recommended fold."
resources   = { memory = "8MB", timeout = "1s", network = false, filesystem = "none" }

[actions.xjson_format]
entry       = "MicronautModelActions.xjson_format"
runtime     = "xcfe"
description = "Return the complete xjson @-key format reference: all top-level sections (@meta, @lanes, @phases, @variables, @edges, @agent.main, @model.core, @runtime.gpu, @moe.router, @skills, @experts), field semantics, naming conventions, and validation rules."
resources   = { memory = "8MB", timeout = "1s", network = false, filesystem = "none" }

[actions.fold_map]
entry       = "MicronautModelActions.fold_map"
runtime     = "xcfe"
description = "Return the fold → micronaut ID mapping table, HLSL entry points, lane numbers, and _MICRONAUT_TO_FOLD Python dict for orchestrator_bot.py."
resources   = { memory = "8MB", timeout = "1s", network = false, filesystem = "none" }

# ── Scaffold / Execute Actions ────────────────────────────────────────────────

[actions.new]
entry       = "scripts/scaffold_micronaut.py"
runtime     = "python.exe"
description = "Scaffold a new micronaut: generates <ID>.xjson + bots.py in model/agents/<ID>/ and registers in both model_api_registry.json and micronaut.registry.xjson. Args: new <ID> <Name> --backend <type> [--weights|--hf-repo|--model|--fold|--experts]."
resources   = { memory = "64MB", timeout = "10s", network = false, filesystem = "readwrite" }
args_schema = { required = ["id", "name", "backend"], optional = ["fold", "experts", "weights", "hf-repo", "hf-file", "model", "api-base", "shard-dir"] }

[actions.register]
entry       = "scripts/scaffold_micronaut.py"
runtime     = "python.exe"
description = "Register an existing .xjson definition into model_api_registry.json and micronaut.registry.xjson. Args: register <path/to/ID.xjson>."
resources   = { memory = "32MB", timeout = "5s", network = false, filesystem = "readwrite" }
args_schema = { required = ["xjson_path"] }

[actions.list]
entry       = "scripts/scaffold_micronaut.py"
runtime     = "python.exe"
description = "List all registered micronauts from model_api_registry.json: ID, name, fold, backend, tools, dispatch_path."
resources   = { memory = "16MB", timeout = "3s", network = false, filesystem = "readonly" }

[actions.fetch_weights]
entry       = "scripts/fetch_oss_weights.py"
runtime     = "python.exe"
description = "Download OSS weights from HuggingFace. Args: --repo <org/model> [--file <filename>] [--out models/oss-cache/]. Uses recommended file if --file omitted. Writes SHA-256 hash + .meta.json sidecar."
resources   = { memory = "128MB", timeout = "600s", network = true, filesystem = "readwrite" }
args_schema = { required = ["repo"], optional = ["file", "out"] }

[actions.native_bridge]
entry       = "assets/micronaut_native.py"
runtime     = "python.exe"
description = "Pure-Python bridge mirroring micronaut_todo_creator.hpp (TodoCreator, TodoItem, TodoJsonSerializer) and deterministic_v6.h (DeterministicV6, TraceLogger). Automatically co-located alongside every new bots.py by scaffold_micronaut.py new. Run directly for a self-test."
resources   = { memory = "8MB", timeout = "5s", network = false, filesystem = "none" }
