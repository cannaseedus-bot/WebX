id = "commands"
name = "Command Runner"
version = "1.0.0"
description = "Run shell commands with stdout/stderr capture via pwsh"
category = "utility"
files = true
command = true
runtime = "xcfe"

[actions.run]
description = "Execute a command with arguments"
entrypoint = "run"
permissions = ["exec:commands"]
resources.memory = "128MB"
resources.timeout = "30s"
