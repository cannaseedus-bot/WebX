<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🧬 Hive Micronaut Atlas | Canonical Registry | 85-Agent Swarm</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #020a06;
      --bg-surface: #051a10;
      --panel-glass: rgba(4, 20, 12, 0.82);
      --panel-solid: #0a1f16;
      --grid-line: rgba(10, 255, 118, 0.12);
      --accent: #0aff76;
      --accent-dim: #0aff7633;
      --text-main: #baffd7;
      --text-muted: #85bca0;
      --warning: #ffd966;
      --radius-card: 20px;
      --shadow-glow: 0 0 12px rgba(10, 255, 118, 0.2);
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0b2818, var(--bg-deep) 80%);
      font-family: 'Inter', 'Segoe UI', 'IBM Plex Mono', monospace;
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* quantum wave canvas */
    #phaseCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }

    .app-container {
      position: relative;
      z-index: 2;
      max-width: 1600px;
      margin: 1.5rem auto;
      padding: 0 1.2rem;
    }

    /* header */
    .swarm-header {
      backdrop-filter: blur(10px);
      background: var(--panel-glass);
      border: 1px solid var(--grid-line);
      border-radius: 28px;
      padding: 1.2rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .title-block h1 {
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #0aff76, #6effb0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .title-block .badge {
      display: inline-block;
      background: #0aff7614;
      border-radius: 80px;
      padding: 0.2rem 0.8rem;
      font-size: 0.7rem;
      border-left: 2px solid var(--accent);
      margin-top: 8px;
    }

    .stats-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      background: rgba(0,0,0,0.5);
      border-radius: 60px;
      padding: 0.6rem 1.5rem;
    }

    .stat {
      text-align: center;
      min-width: 78px;
    }
    .stat-value {
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* controls row */
    .control-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      background: var(--panel-glass);
      border-radius: 40px;
      padding: 0.8rem 1.5rem;
      margin-bottom: 1.8rem;
      align-items: center;
      justify-content: space-between;
    }

    .search-filter {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    input, select {
      background: #021008;
      border: 1px solid var(--grid-line);
      border-radius: 40px;
      padding: 8px 16px;
      color: var(--text-main);
      font-family: inherit;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
    }
    button {
      background: #0aff7620;
      border: 1px solid var(--accent);
      border-radius: 40px;
      padding: 8px 16px;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: var(--accent);
      color: #020a06;
      box-shadow: var(--shadow-glow);
    }

    /* Atomic Micronaut console (API projection) */
    .mn-console {
      margin-top: 14px;
      background: var(--panel-glass);
      border: 1px solid var(--grid-line);
      border-radius: 22px;
      padding: 14px 16px;
      display: none;
      gap: 10px;
    }
    .mn-console.open {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      align-items: end;
    }
    .mn-console label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 6px 2px;
    }
    .mn-console textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--grid-line);
      background: #021008;
      color: var(--text-main);
      font-family: "IBM Plex Mono", Consolas, monospace;
      font-size: 13px;
      line-height: 1.4;
      outline: none;
    }
    .mn-console textarea:focus {
      border-color: var(--accent);
    }
    .mn-console .mn-actions {
      display: grid;
      gap: 10px;
      justify-items: stretch;
    }
    .mn-console .mn-actions button {
      width: 100%;
    }
    .mn-console .mn-log {
      grid-column: 1 / -1;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(10, 255, 118, 0.10);
      border-radius: 14px;
      padding: 10px 12px;
      font-family: "IBM Plex Mono", Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      color: var(--text-main);
      max-height: 210px;
      overflow: auto;
    }
    .mn-console .mn-log .mn-error {
      color: #ff8585;
    }
    .mn-console .mn-block {
      border: 1px solid rgba(10, 255, 118, 0.12);
      background: rgba(0,0,0,0.38);
      border-radius: 14px;
      padding: 12px 12px;
      margin: 8px 0;
    }
    .mn-console .mn-title {
      font-size: 12px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 8px 0;
    }
    .mn-console .mn-kv {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 6px 12px;
      align-items: start;
      font-family: "IBM Plex Mono", Consolas, monospace;
      font-size: 12px;
    }
    .mn-console .mn-k {
      color: #78cfa4;
    }
    .mn-console .mn-v {
      color: var(--text-main);
      overflow-wrap: anywhere;
    }
    .mn-console .mn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }
    .mn-console .mn-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 100px;
      border: 1px solid rgba(10, 255, 118, 0.18);
      background: rgba(10, 255, 118, 0.08);
      font-size: 12px;
      font-family: "IBM Plex Mono", Consolas, monospace;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .mn-console .mn-chip:hover {
      border-color: var(--accent);
      background: rgba(10, 255, 118, 0.16);
    }
    .mn-console .mn-code {
      font-family: "IBM Plex Mono", Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    /* atlas grid */
    .atlas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 22px;
      margin-top: 16px;
    }

    .micronaut-card {
      background: linear-gradient(145deg, var(--panel-glass), rgba(2, 12, 7, 0.95));
      backdrop-filter: blur(4px);
      border: 1px solid var(--grid-line);
      border-radius: var(--radius-card);
      padding: 1.2rem;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .micronaut-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 10px;
    }
    .id-badge {
      background: var(--accent-dim);
      padding: 4px 12px;
      border-radius: 100px;
      font-family: monospace;
      font-weight: bold;
      font-size: 0.8rem;
    }
    .fold-badge {
      background: #00a84d20;
      border: 1px solid var(--accent);
      border-radius: 40px;
      padding: 2px 10px;
      font-size: 0.7rem;
      text-transform: uppercase;
    }
    .card-title {
      font-size: 1.35rem;
      font-weight: 600;
      margin-top: 6px;
    }
    .meta-row {
      display: flex;
      gap: 12px;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-bottom: 1px dashed var(--grid-line);
      padding-bottom: 8px;
    }
    .detail-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
    }
    .detail-item {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 8px 10px;
    }
    .detail-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .detail-value {
      font-size: 0.75rem;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .contract-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
      grid-column: span 2;
    }
    .contract-item {
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(10, 255, 118, 0.12);
      border-radius: 14px;
      padding: 8px 10px;
      min-width: 0;
    }
    .contract-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .contract-value {
      font-size: 0.72rem;
      color: var(--text-main);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .expert-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .chip {
      background: #1f3a2a;
      border-radius: 16px;
      padding: 2px 8px;
      font-size: 0.6rem;
      font-family: monospace;
    }
    .footer-note {
      font-size: 0.7rem;
      border-top: 1px solid var(--grid-line);
      padding-top: 10px;
      margin-top: 4px;
      color: var(--text-muted);
    }
    .kind-badge, .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid var(--grid-line);
      background: rgba(10, 255, 118, 0.08);
      color: var(--text-main);
    }
    .source-badge {
      margin-left: auto;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    .registry-note {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem;
      background: var(--panel-glass);
      border-radius: 32px;
    }
    @media (max-width: 720px) {
      .app-container { padding: 0 0.8rem; }
      .swarm-header { flex-direction: column; align-items: start; }
      .detail-section { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <textarea id="mnPrompt" placeholder="spawn prompt or message..."></textarea>
    </div>
    <div class="mn-actions">
      <button id="mnGet">Get</button>
      <button id="mnMessage">Message</button>
    </div>
    <div id="mnLog" class="mn-log"></div>
  </div>

  <div id="atlasContainer" class="atlas-grid"></div>
</div>

      const bag = [entry.backend, entry.description, entry.notes, entry.name, entry.id].filter(Boolean).join(" ").toLowerCase();
      const qwen = bag.match(/qwen[^\s|,)]*/);
      if (qwen) return qwen[0];
      const phi = bag.match(/phi-?3[^\s|,)]*/);
      if (phi) return phi[0];

      if (gpt2) return gpt2[0];
      if (bag.includes("ollama")) return "ollama";
      if (bag.includes("safetensors")) return "safe_tensors";
      if (bag.includes("scxqdds")) return "scxqdds";
      return "—";
    }

    function parseAtomicBlocks(source) {
      const text = String(source || '');
      const blocks = [];
      const headerRe = /\(\s*⟁(EXPERT|AGENT|SKILL|BOT|OPCODE|POP|CREATE|SYSTEM|ARCHITECTURE)⟁\s*\)\s*([A-Za-z0-9_]+)?/g;
      function findBlockStart(idx) {
        for (let i = idx; i < text.length; i++) {
          if (text[i] === '{') return i;
        }
        return -1;
      }
      function scanBraces(openIdx) {
        let depth = 0;
        for (let i = openIdx; i < text.length; i++) {
          const ch = text[i];
          if (ch === '{') depth++;
          else if (ch === '}') {
            depth--;
            if (depth === 0) return i;
          }
        }
        return -1;
      }
      let m;
      while ((m = headerRe.exec(text)) !== null) {
        const kind = m[1];
        const name = m[2] || '';
        const start = m.index;
        const open = findBlockStart(headerRe.lastIndex);
        if (open === -1) continue;
        const close = scanBraces(open);
        if (close === -1) continue;
        const body = text.slice(open + 1, close);
        blocks.push({ kind, name, start, end: close + 1, body });
        headerRe.lastIndex = close + 1;
      }
      return blocks;
    }

    function pickField(body, key) {
      const re = new RegExp('@' + key + '\\\\s*:\\\\s*([^,\\\\n]+)', 'i');
      const m = String(body).match(re);
      return m ? m[1].trim() : '';
    }

    function pickShaderCode(body) {
      const s = String(body);
      const i = s.indexOf('[|');
      const j = s.indexOf('|]');
      if (i === -1 || j === -1 || j <= i) return '';
      return s.slice(i + 2, j).trim();
    }

    function renderAtomicBlocks(sourceText) {
      const blocks = parseAtomicBlocks(sourceText);
      if (!blocks.length) return false;
      const byKind = new Map();
      blocks.forEach(b => {
        if (!byKind.has(b.kind)) byKind.set(b.kind, []);
        byKind.get(b.kind).push(b);
      });

      clearLog();
      const summary = Array.from(byKind.keys()).sort().map(k => `${k}:${byKind.get(k).length}`).join('  ');
      mnLog.insertAdjacentHTML('beforeend', `<div class="mn-block"><div class="mn-title">Atomic Blocks</div><div class="mn-code">${esc(summary)}</div></div>`);

      const renderGroup = (kind, title) => {
        const items = byKind.get(kind) || [];
        if (!items.length) return;
        const cards = items.map(item => {
          const id = pickField(item.body, 'id') || '';
          const dns = pickField(item.body, 'dns') || '';
          const port = pickField(item.body, 'port') || '';
          const opcode = pickField(item.body, 'opcode') || '';
          const shader = (kind === 'EXPERT') ? pickShaderCode(item.body) : '';
          const kv = [
            ['name', item.name || ''],
            ...(id ? [['id', id]] : []),
            ...(dns ? [['dns', dns]] : []),
            ...(port ? [['port', port]] : []),
            ...(opcode ? [['opcode', opcode]] : []),
          ];
          return `
            <div class="mn-block" style="margin:0;">
              <div class="mn-title">${esc(item.name || title)}</div>
              ${renderKV(kv)}
              ${shader ? `<div class="mn-title" style="margin-top:10px;">shader_code</div><div class="mn-code">${esc(shader)}</div>` : ''}
            </div>
          `;
        }).join('');
        mnLog.insertAdjacentHTML('beforeend', `
          <div class="mn-block">
            <div class="mn-title">${esc(title)} (${items.length})</div>
            <div class="mn-grid">${cards}</div>
          </div>
        `);
      };

      renderGroup('EXPERT', 'Shader Experts');
      renderGroup('AGENT', 'Agents');
      renderGroup('SKILL', 'Skills');
      renderGroup('BOT', 'Bots');
      renderGroup('OPCODE', 'Opcodes');

      mnLog.scrollTop = mnLog.scrollHeight;
      return true;
    }
    function mnBase() {
      return (document.getElementById('mnApiBase').value || '').replace(/\/+$/, '');
    }
    async function mnFetch(path, options) {
      const url = mnBase() + path;
      const res = await fetch(url, options);
      const text = await res.text();
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${text}`);
      try { return JSON.parse(text); } catch { return text; }
    }
    document.getElementById('toggleMicronautConsoleBtn').addEventListener('click', () => {
      mnConsole.classList.toggle('open');
      if (mnConsole.classList.contains('open')) {
        mnAppend('Micronaut console open. Start API with: python .\\\\llm\\\\run_atomic_micronaut_api.py', false);
      }
    });
    document.getElementById('mnList').addEventListener('click', async () => {
      try {
        const data = await mnFetch('/micronaut', { method: 'GET' });
        if (!renderList(data)) mnAppend(JSON.stringify(data, null, 2), false);
      } catch (e) {
        mnAppend(String(e.message || e), true);
      }
    });
    document.getElementById('mnSpawn').addEventListener('click', async () => {
      const prompt = document.getElementById('mnPrompt').value.trim();
      const id = document.getElementById('mnId').value.trim();
      if (!prompt) return mnAppend('prompt required for spawn', true);
      try {
        const payload = { prompt };
        if (id) payload.id = id;
        const data = await mnFetch('/micronaut/spawn', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!renderMicronaut(data)) mnAppend(JSON.stringify(data, null, 2), false);
      } catch (e) {
        mnAppend(String(e.message || e), true);
      }
    });
    document.getElementById('mnGet').addEventListener('click', async () => {
      const id = document.getElementById('mnId').value.trim();
      if (!id) return mnAppend('micronaut id required', true);
      try {
        const data = await mnFetch(`/micronaut/${encodeURIComponent(id)}`, { method: 'GET' });
        if (!renderMicronaut(data)) mnAppend(JSON.stringify(data, null, 2), false);
      } catch (e) {
        mnAppend(String(e.message || e), true);
      }
    });
    document.getElementById('mnMessage').addEventListener('click', async () => {
      const id = document.getElementById('mnId').value.trim();
      const message = document.getElementById('mnPrompt').value.trim();
      if (!id) return mnAppend('micronaut id required', true);
      if (!message) return mnAppend('message required', true);
      try {
        const data = await mnFetch(`/micronaut/${encodeURIComponent(id)}/message`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        if (!renderMicronaut(data)) mnAppend(JSON.stringify(data, null, 2), false);
      } catch (e) {
        mnAppend(String(e.message || e), true);
      }
    });

    document.getElementById('mnLoadBlocks').addEventListener('click', async () => {
      const path = (document.getElementById('mnAtomicPath').value || '').trim();
      if (!path) return mnAppend('atomic blocks path required', true);
      try {
        const url = mnBase() + path;
        const res = await fetch(url, { method: 'GET' });
        const text = await res.text();
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${text}`);
        if (!renderAtomicBlocks(text)) mnAppend(text, false);
      } catch (e) {
        mnAppend(String(e.message || e), true);
      }
    });
    document.getElementById('searchField').addEventListener('input', renderAtlas);
    document.getElementById('kindSelect').addEventListener('change', renderAtlas);
    document.getElementById('foldSelect').addEventListener('change', renderAtlas);
    document.getElementById('transportSelect').addEventListener('change', renderAtlas);

    // dynamic canvas: phase geodesic flow
    function initPhaseCanvas() {
      const canvas = document.getElementById('phaseCanvas');
      let width = window.innerWidth, height = window.innerHeight;
      let ctx = canvas.getContext('2d');
      let time = 0;
      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resize);
      resize();

      function draw() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        ctx.globalCompositeOperation = 'source-over';
        const gradient = ctx.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, '#020a0600');
        gradient.addColorStop(1, '#0b1f1200');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
        
        ctx.strokeStyle = '#0aff7633';
        ctx.lineWidth = 1.2;
        for (let i = 0; i < 24; i++) {
          const phase = (time * 0.002 + i * 0.5) % (Math.PI * 2);
          const amp = 32 + 14 * Math.sin(time * 0.0015 + i);
          ctx.beginPath();
          for (let x = 0; x < width; x += 28) {
            const y = height/2 + amp * Math.sin(x * 0.012 + phase + i * 0.9);
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
        // geodesic dots
        ctx.fillStyle = '#0aff7680';
        for (let i = 0; i < 90; i++) {
          const fx = (Math.sin(time * 0.001 + i) * 0.5 + 0.5) * width;
          const fy = (Math.cos(time * 0.0013 + i * 0.33) * 0.3 + 0.5) * height;
          ctx.beginPath();
          ctx.arc(fx, fy, 1.8, 0, Math.PI*2);
          ctx.fill();
        }
        requestAnimationFrame(() => { time+= 16; draw(); });
      }
      draw();
    }
    initPhaseCanvas();

    // embed verifier splash (K-UX aligned)
    setTimeout(() => {
      const splash = document.createElement('div');
      splash.style.position = 'fixed';
      splash.style.bottom = '18px';
      splash.style.right = '18px';
      splash.style.background = '#051a10dd';
      splash.style.backdropFilter = 'blur(8px)';
      splash.style.borderLeft = '3px solid #0aff76';
      splash.style.padding = '8px 15px';
      splash.style.borderRadius = '40px';
      splash.style.fontSize = '11px';
      splash.style.zIndex = 99;
      splash.innerHTML = '🧬 K-UX ACTIVE · 85 AGENTS · PHASE COLLAPSE VERIFIED';
      document.body.appendChild(splash);
      setTimeout(() => { splash.style.opacity = '0.7'; }, 200);
    }, 100);

    populateSelectors();
    renderAtlas();
  })();
