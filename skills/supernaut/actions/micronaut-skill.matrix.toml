[skill]
name        = "micronaut"
version     = "1.0.0"
description = "Micronaut runtime — deterministic model/skill registry, model_arbitrate, projection layers, TOML skill definitions"
runtime     = "xcfe"
shard_checkpoint = true

[actions]
arbitrate        = { entry = "MicronautActions.arbitrate",        runtime = "xcfe" }
project_model    = { entry = "MicronautActions.project_model",    runtime = "xcfe" }
list_skills      = { entry = "MicronautActions.list_skills",      runtime = "xcfe" }
validate_toml    = { entry = "MicronautActions.validate_toml",    runtime = "xcfe" }
sync_registry    = { entry = "MicronautActions.sync_registry",    runtime = "xcfe" }
pack_shard       = { entry = "MicronautActions.pack_shard",       runtime = "xcfe" }

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"
