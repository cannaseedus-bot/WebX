[skill]
name        = "figma-implement-design"
version     = "1.0.0"
description = "Figma-to-code implementation — translate Figma frames to React/HTML/CSS, map tokens to design system, emit component code"
runtime     = "xcfe"
shard_checkpoint = false

[actions]
frame_to_react   = { entry = "FigmaImplementDesignActions.frame_to_react",   runtime = "xcfe" }
frame_to_html    = { entry = "FigmaImplementDesignActions.frame_to_html",    runtime = "xcfe" }
map_tokens       = { entry = "FigmaImplementDesignActions.map_tokens",       runtime = "xcfe" }
emit_component   = { entry = "FigmaImplementDesignActions.emit_component",   runtime = "xcfe" }
sync_styles      = { entry = "FigmaImplementDesignActions.sync_styles",      runtime = "xcfe" }
