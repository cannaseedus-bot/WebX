[skill]
name        = "codex-agent"
version     = "1.0.0"
description = "Codex agent — autonomous code generation, refactor, test writing, and multi-file edit with agentic loop"
runtime     = "xcfe"
shard_checkpoint = true

[actions]
generate_code    = { entry = "CodexAgentActions.generate_code",    runtime = "xcfe" }
refactor         = { entry = "CodexAgentActions.refactor",         runtime = "xcfe" }
write_tests      = { entry = "CodexAgentActions.write_tests",      runtime = "xcfe" }
explain_code     = { entry = "CodexAgentActions.explain_code",     runtime = "xcfe" }
review_pr        = { entry = "CodexAgentActions.review_pr",        runtime = "xcfe" }
pack_shard       = { entry = "CodexAgentActions.pack_shard",       runtime = "xcfe" }

[shard]
registry = "artifacts/training/shard-manifest.json"
index    = "artifacts/training/shard-index.json"
format   = "scxqdds"
