<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>K'UHUL++ Neural Network Inference Demo</title>
  <style>
    body { font-family: monospace; background: #0a0a14; color: #ddd; margin: 0; padding: 20px; }
    h1 { color: #7c3aed; } h2 { color: #6d28d9; margin-top: 16px; }
    canvas { border: 1px solid #4c1d95; border-radius: 4px; display: block; margin: 8px 0; }
    button { background: #5b21b6; color: #fff; border: none; padding: 8px 18px;
             border-radius: 4px; cursor: pointer; margin: 4px; }
    button:hover { background: #4c1d95; }
    #log { background: #110d20; padding: 10px; border-radius: 6px; white-space: pre-wrap;
           font-size: 12px; max-height: 180px; overflow-y: auto; color: #a78bfa; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .card { background: #13102a; border: 1px solid #2e1065; border-radius: 8px;
            padding: 14px; flex: 1; min-width: 200px; }
  </style>
</head>
<body>
  <h1>🧠 K'UHUL++ Neural Inference Demo</h1>
  <div class="row">
    <div class="card">
      <h2>Input</h2>
      <canvas id="inputC" width="160" height="100"></canvas>
      <button onclick="randomInput()">Random</button>
    </div>
    <div class="card">
      <h2>Hidden Layer</h2>
      <canvas id="hiddenC" width="200" height="100"></canvas>
    </div>
    <div class="card">
      <h2>Output Probs</h2>
      <canvas id="outputC" width="200" height="100"></canvas>
      <p id="pred" style="color:#fbbf24;font-size:16px">-</p>
      <p id="timing" style="color:#6ee7b7;font-size:12px">-</p>
    </div>
  </div>
  <br/>
  <button onclick="runInference()">▶ Run Inference</button>
  <h2>Log</h2>
  <div id="log">Ready.</div>
  <script>
    function softmax(a){const m=Math.max(...a),e=a.map(x=>Math.exp(x-m)),s=e.reduce((a,b)=>a+b,0);return e.map(x=>x/s)}
    function relu(x){return Math.max(0,x)}
    function randn(){return (Math.random()-0.5)*0.8}
    function dense(inp,out){
      const W=Array.from({length:out*inp.length},randn),b=Array.from({length:out},()=>randn()*0.1);
      return Array.from({length:out},(_,i)=>relu(b[i]+inp.reduce((s,x,j)=>s+W[i*inp.length+j]*x,0)));
    }
    function drawBars(id,vals){
      const c=document.getElementById(id),ctx=c.getContext('2d'),{width:w,height:h}=c;
      ctx.fillStyle='#0a0818';ctx.fillRect(0,0,w,h);
      const bh=Math.floor(h/vals.length)-1;
      vals.forEach((v,i)=>{
        const bw=Math.max(1,v*(w-42)),hue=Math.round(240-v*180);
        ctx.fillStyle=`hsl(${hue},80%,55%)`;ctx.fillRect(38,i*(bh+1),bw,bh);
        ctx.fillStyle='#666';ctx.font='9px monospace';ctx.fillText(v.toFixed(2),0,i*(bh+1)+bh);
      });
    }
    let inp=Array.from({length:8},Math.random);
    function randomInput(){inp=Array.from({length:8},Math.random);drawBars('inputC',inp);}
    function runInference(){
      const t0=performance.now();
      drawBars('inputC',inp);
      const h1=dense(inp,16),h2=dense(h1,10);
      const pr=softmax(h2);
      drawBars('hiddenC',h1.map(v=>v/Math.max(...h1,1)));
      drawBars('outputC',pr);
      const ms=(performance.now()-t0).toFixed(2);
      const maxI=pr.indexOf(Math.max(...pr));
      document.getElementById('pred').textContent=`Class ${maxI} (${(pr[maxI]*100).toFixed(1)}%)`;
      document.getElementById('timing').textContent=`${ms}ms`;
      document.getElementById('log').textContent+=`\n[${ms}ms] class=${maxI} prob=${(pr[maxI]*100).toFixed(1)}%`;
    }
    randomInput();
  </script>
</body>
</html>
