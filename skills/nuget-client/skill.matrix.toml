id = "nuget-client"
name = "NuGet Client Libraries & Build Tasks (VS 2022 BuildTools, v6.14.2.2)"
version = "1.0.0"
description = "Full NuGet client library stack and MSBuild build tasks installed under VS 2022 BuildTools CommonExtensions. NuGet version 6.14.2.2. Contains the complete NuGet SDK: NuGet.Build.Tasks.dll (MSBuild restore/pack tasks), NuGet.Build.Tasks.Console.exe (out-of-proc static-graph restore runner), NuGet.Commands.dll (restore/pack/push command logic), NuGet.Protocol.dll (HTTP + local feed protocol), NuGet.ProjectModel.dll (project.assets.json read/write), NuGet.DependencyResolver.Core.dll (graph resolution), NuGet.Packaging.dll (.nupkg read/write), NuGet.Configuration.dll (nuget.config parsing), NuGet.Frameworks.dll (TFM parsing/compatibility), NuGet.Versioning.dll (semver parsing), Microsoft.Build.NuGetSdkResolver.dll (MSBuild SDK resolver for NuGet-based SDKs), Microsoft.Web.XmlTransform.dll (web.config transforms). Use when: debugging NuGet restore, understanding project.assets.json structure, working with custom NuGet feeds, SDK-style project restore, or diagnosing NuGet.Build.Tasks failures."
category = "sdk"
files = false

[env]
root              = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\IDE\\CommonExtensions\\Microsoft\\NuGet"
build_tasks_dll   = "NuGet.Build.Tasks.dll"
console_exe       = "NuGet.Build.Tasks.Console.exe"
sdk_resolver_dll  = "Microsoft.Build.NuGetSdkResolver.dll"
nuget_props       = "NuGet.props"
nuget_targets     = "NuGet.targets"
restore_ex_targets = "NuGet.RestoreEx.targets"

[versions]
nuget = "6.14.2.2"

[key_assemblies]
"NuGet.Build.Tasks"          = "MSBuild restore/pack/push tasks"
"NuGet.Build.Tasks.Console"  = "Out-of-proc static-graph restore runner"
"NuGet.Commands"             = "High-level restore/pack/push command logic"
"NuGet.Protocol"             = "HTTP + v2/v3 feed + local folder protocol"
"NuGet.ProjectModel"         = "project.assets.json + lock file model"
"NuGet.DependencyResolver.Core" = "Dependency graph resolution engine"
"NuGet.Packaging"            = ".nupkg + .nuspec read/write"
"NuGet.Configuration"        = "nuget.config parsing (sources, credentials, proxies)"
"NuGet.Frameworks"           = "TFM/NuGetFramework parsing and compatibility"
"NuGet.Versioning"           = "NuGet semver parsing and range evaluation"
"NuGet.Credentials"          = "Token provider / credential plugin host"
"NuGet.PackageManagement"    = "Install/uninstall package management"
"NuGet.Resolver"             = "Dependency conflict resolution"
"NuGet.LibraryModel"         = "Package/project library model"
"Microsoft.Build.NuGetSdkResolver" = "MSBuild SDK resolver for NuGet-based SDKs"
"Microsoft.Web.XmlTransform" = "web.config XML transforms during publish"

[actions.query]
description = "Explain NuGet 6.14.2.2 client libraries, restore pipeline, and project.assets.json structure"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"

[actions.debug_restore]
description = "Diagnose NuGet restore failures, feed issues, credential problems, or SDK resolution errors"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"
