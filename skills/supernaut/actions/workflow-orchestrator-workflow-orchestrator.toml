[agent]
name = "workflow_orchestrator_agent"
entry = "WorkflowOrchestratorActions.plan_project"

[routes]
plan_project = "WorkflowOrchestratorActions.plan_project"
automate_workflow = "WorkflowOrchestratorActions.automate_workflow"
scaffold_kuhul_app = "WorkflowOrchestratorActions.scaffold_kuhul_app"
micronaut_init = "MicronautAddonActions.start_project"
micronaut_configure = "MicronautAddonActions.configure_endpoint"
micronaut_secure = "MicronautAddonActions.secure_endpoint"
micronaut_inject = "MicronautAddonActions.inject_bean"
micronaut_schedule = "MicronautAddonActions.schedule_task"
micronaut_event = "MicronautAddonActions.event_bridge"

[skill]
name = "workflow_orchestrator_skill"
entry = "WorkflowOrchestratorActions.plan_project"

[tools]
code = true

[runtime]
dataRoot = "."
