[agent]
name = "sk-coordinator"
entry = "SemanticPlannerActions.generate_learning_plan"

[routes]
learn_topic            = "SemanticPlannerActions.generate_learning_plan"
orchestrate_multi_call = "SemanticPlannerActions.build_multi_step_plan"
micronaut_di_inject    = "MicronautDIActions.inject_component"
schedule_learning      = "LearningSchedulerActions.schedule_learning"
micronaut_init         = "MicronautAddonActions.start_project"
micronaut_configure    = "MicronautAddonActions.configure_endpoint"
micronaut_secure       = "MicronautAddonActions.secure_endpoint"
micronaut_inject       = "MicronautAddonActions.inject_bean"
micronaut_schedule     = "MicronautAddonActions.schedule_task"
micronaut_event        = "MicronautAddonActions.event_bridge"
semantic_parse_intent  = "SKCoordinatorActions.parse_intent"
schedule_learning_goal = "SKCoordinatorActions.schedule_learning_goal"
orchestrate_micronaut  = "SKCoordinatorActions.route_to_micronaut"
meta_plan_goal_graph   = "SKCoordinatorActions.build_goal_graph"
dx_eval_ir             = "DxMathActions.eval_ir"
dx_select_backend      = "DxMathActions.select_backend"
dx_lattice_node        = "DxMathActions.lattice_node"
dx_rotate              = "DxMathActions.rotate"
dx_normalize           = "DxMathActions.normalize"
dx_transform           = "DxMathActions.transform"
dx_dot                 = "DxMathActions.dot"
dx_cross               = "DxMathActions.cross"

[skill]
name  = "sk_coordinator_skill"
entry = "SemanticPlannerActions.generate_learning_plan"

[tools]
code  = true
model = true

[handler]
mode         = "hybrid"
backend      = "manifest"
manifestPath = "../../../model/manifest.json"
gta1Path     = "../../../model/expert.gta1"
preferGta1   = false

[native]
dll        = "dxmath_ir.dll"
entrypoint = "EvaluateMathIR"
fallback   = "scalar"

[runtime]
dataRoot = "../intentions"
