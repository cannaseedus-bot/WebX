<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>K'UHUL++ 3D Mesh Viewer</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#080818;color:#ccc;font-family:monospace;display:flex;flex-direction:column;height:100vh}
    #hdr{padding:10px 20px;background:#0f0a28;border-bottom:1px solid #2d1b69;flex-shrink:0}
    h1{color:#a78bfa;margin:0;font-size:18px;display:inline}
    #main{display:flex;flex:1;overflow:hidden}
    #side{width:200px;background:#0d0b22;border-right:1px solid #1e1b4b;padding:12px;overflow-y:auto;flex-shrink:0}
    #side h2{color:#818cf8;font-size:12px;margin:8px 0 4px}
    canvas{flex:1;display:block}
    button{background:#4338ca;color:#fff;border:none;padding:5px 10px;border-radius:3px;cursor:pointer;font-size:11px;margin:2px 0;width:100%}
    button:hover{background:#3730a3}
    label{font-size:11px;color:#94a3b8;display:block;margin-top:4px}
    input[type=range]{width:100%;margin:2px 0}
    .v{color:#a5f3fc;font-size:11px}
  </style>
</head>
<body>
  <div id="hdr"><h1>K'UHUL++ 3D Mesh Viewer</h1><span style="color:#64748b;font-size:11px;margin-left:12px">Glyph transform demo</span></div>
  <div id="main">
    <div id="side">
      <h2>Mesh</h2>
      <button onclick="loadMesh('sphere')">Sphere</button>
      <button onclick="loadMesh('cube')">Cube</button>
      <button onclick="loadMesh('torus')">Torus</button>
      <h2>⤍ Scale X</h2>
      <label><span class="v" id="sxv">1.0</span></label>
      <input type="range" id="sx" min="0.2" max="3" step="0.05" value="1" oninput="sxv.textContent=this.value;render()">
      <h2>↻ Rotate Y°</h2>
      <label><span class="v" id="ryv">0</span>°</label>
      <input type="range" id="ry" min="0" max="360" step="1" value="0" oninput="ryv.textContent=this.value;render()">
      <h2>∿ Torsion</h2>
      <label><span class="v" id="tv">0.0</span></label>
      <input type="range" id="tf" min="0" max="1.5" step="0.05" value="0" oninput="tv.textContent=(+this.value).toFixed(2);render()">
      <h2>⊙ Radius</h2>
      <label><span class="v" id="rv">1.0</span></label>
      <input type="range" id="rad" min="0.3" max="3" step="0.05" value="1" oninput="rv.textContent=(+this.value).toFixed(2);render()">
      <h2>Animate</h2>
      <button onclick="toggleAnim()" id="ab">▶ Start</button>
      <div id="info" style="font-size:11px;color:#64748b;margin-top:8px">-</div>
    </div>
    <canvas id="c"></canvas>
  </div>
  <script>
    const c=document.getElementById('c'),ctx=c.getContext('2d');
    let mesh,autoRot=0,animId=null,anim=false;
    function sphere(r=0.9,rings=10,segs=16){
      const v=[];
      for(let i=0;i<rings;i++){const t0=Math.PI*i/rings,t1=Math.PI*(i+1)/rings;
        for(let j=0;j<segs;j++){const p0=2*Math.PI*j/segs,p1=2*Math.PI*(j+1)/segs;
          v.push(r*Math.sin(t0)*Math.cos(p0),r*Math.cos(t0),r*Math.sin(t0)*Math.sin(p0),
                 r*Math.sin(t0)*Math.cos(p1),r*Math.cos(t0),r*Math.sin(t0)*Math.sin(p1));}}
      return v;}
    function cube(s=0.8){const h=s/2,p=[-h,-h,-h,h,-h,-h,h,-h,-h,h,h,-h,h,h,-h,-h,h,-h,-h,h,-h,-h,-h,-h,
      -h,-h,h,h,-h,h,h,-h,h,h,h,h,h,h,h,-h,h,h,-h,h,h,-h,-h,h,
      -h,-h,-h,-h,-h,h,-h,h,-h,-h,h,h,h,-h,-h,h,-h,h,h,h,-h,h,h,h];return p;}
    function torus(R=0.7,r=0.25,s=20,t=12){const v=[];
      for(let i=0;i<s;i++){for(let j=0;j<t;j++){
        const t0=2*Math.PI*i/s,t1=2*Math.PI*(i+1)/s;
        const vt=(th,p)=>[(R+r*Math.cos(p))*Math.cos(th),r*Math.sin(p),(R+r*Math.cos(p))*Math.sin(th)];
        const [ax,ay,az]=vt(t0,2*Math.PI*j/t),[bx,by,bz]=vt(t1,2*Math.PI*j/t);
        v.push(ax,ay,az,bx,by,bz);}}return v;}
    function loadMesh(type){
      const gen={sphere,cube,torus};mesh=new Float32Array(gen[type]());render();}
    function rotY(v,a){const r=a*Math.PI/180,co=Math.cos(r),si=Math.sin(r),o=new Float32Array(v.length);
      for(let i=0;i+2<v.length;i+=3){o[i]=v[i]*co-v[i+2]*si;o[i+1]=v[i+1];o[i+2]=v[i]*si+v[i+2]*co;}return o;}
    function scaleX(v,s){const o=new Float32Array(v.length);
      for(let i=0;i+2<v.length;i+=3){o[i]=v[i]*s;o[i+1]=v[i+1];o[i+2]=v[i+2];}return o;}
    function torsion(v,f){const o=new Float32Array(v.length);
      for(let i=0;i+2<v.length;i+=3){const a=f*v[i+1],co=Math.cos(a),si=Math.sin(a);
        o[i]=v[i]*co-v[i+2]*si;o[i+1]=v[i+1];o[i+2]=v[i]*si+v[i+2]*co;}return o;}
    function proj(x,y,z,cx,cy){const d=2/(2+z+1.5),sc=Math.min(c.width,c.height)*0.42;
      return[cx+x*d*sc,cy-y*d*sc];}
    function render(){
      c.width=c.offsetWidth;c.height=c.offsetHeight;
      let v=scaleX(mesh,+document.getElementById('sx').value);
      v=rotY(v,+document.getElementById('ry').value+autoRot);
      v=torsion(v,+document.getElementById('tf').value);
      ctx.fillStyle='#080818';ctx.fillRect(0,0,c.width,c.height);
      const cx=c.width/2,cy=c.height/2,n=Math.floor(v.length/6);
      for(let i=0;i<n;i++){const b=i*6;
        const[ax,ay]=proj(v[b],v[b+1],v[b+2],cx,cy);
        const[bx,by]=proj(v[b+3],v[b+4],v[b+5],cx,cy);
        const depth=(v[b+2]+v[b+5])/2+2;
        ctx.globalAlpha=Math.max(0.1,Math.min(0.9,depth/4));
        ctx.strokeStyle='rgba(139,92,246,0.7)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();}
      ctx.globalAlpha=1;
      document.getElementById('info').textContent=`Lines: ${n}  Verts: ${Math.floor(v.length/3)}`;}
    function toggleAnim(){anim=!anim;document.getElementById('ab').textContent=anim?'⏹ Stop':'▶ Start';
      if(anim)loop();else cancelAnimationFrame(animId);}
    function loop(){autoRot=(autoRot+0.4)%360;render();if(anim)animId=requestAnimationFrame(loop);}
    window.addEventListener('resize',render);
    loadMesh('sphere');
  </script>
</body>
</html>
