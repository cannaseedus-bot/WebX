id = "vs2022-tools"
name = "VS 2022 Developer Tools"
version = "1.0.0"
description = "Visual Studio 2022 developer environment bootstrap. Two installations present: Community (full IDE) and BuildTools (CI/headless). Covers Developer PowerShell (Enter-VsDevShell), Developer Command Prompt (VsDevCmd.bat), and Debuggable Package Manager for UWP app debugging."
category = "compiler"
files = false

[env.community]
root         = "C:\\Program Files\\Microsoft Visual Studio\\2022\\Community"
devshell_dll = "C:\\Program Files\\Microsoft Visual Studio\\2022\\Community\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll"
vsdevcmd     = "C:\\Program Files\\Microsoft Visual Studio\\2022\\Community\\Common7\\Tools\\VsDevCmd.bat"
instance_id  = "8b9bc1a3"

[env.buildtools]
root         = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools"
devshell_dll = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\Tools\\Microsoft.VisualStudio.DevShell.dll"
vsdevcmd     = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\Common7\\Tools\\VsDevCmd.bat"
instance_id  = "dd805f0f"

[actions.devshell_community]
description = "Enter VS 2022 Community Developer PowerShell (Enter-VsDevShell 8b9bc1a3)"
entrypoint   = "powershell"
permissions  = ["read:env", "exec:powershell"]
resources.memory  = "64MB"
resources.timeout = "15s"

[actions.devshell_buildtools]
description = "Enter VS 2022 BuildTools Developer PowerShell (Enter-VsDevShell dd805f0f) — use for headless/CI builds"
entrypoint   = "powershell"
permissions  = ["read:env", "exec:powershell"]
resources.memory  = "64MB"
resources.timeout = "15s"

[actions.devcmd_community]
description = "Open VS 2022 Community Developer Command Prompt (VsDevCmd.bat)"
entrypoint   = "cmd"
permissions  = ["read:env", "exec:cmd"]
resources.memory  = "32MB"
resources.timeout = "10s"

[actions.devcmd_buildtools]
description = "Open VS 2022 BuildTools Developer Command Prompt (VsDevCmd.bat) — use for headless/CI builds"
entrypoint   = "cmd"
permissions  = ["read:env", "exec:cmd"]
resources.memory  = "32MB"
resources.timeout = "10s"

[actions.debuggable_package_manager]
description = "Launch PowerShell with Appx + AppxDebug modules for UWP/MSIX sideload debugging"
entrypoint   = "powershell"
permissions  = ["read:env", "exec:powershell"]
resources.memory  = "64MB"
resources.timeout = "15s"
