id = "msvc-14-29"
name = "MSVC Toolchain 14.29.30133 (VS 2019 BuildTools)"
version = "1.0.0"
description = "Microsoft C/C++ compiler toolchain version 14.29.30133 (VS 2019 16.11.x) from VS 2019 BuildTools. Located at VC\\Tools\\MSVC\\14.29.30133\\bin\\. Four host/target architecture variants: Hostx64\\x64 (native x64, most common), Hostx64\\x86 (x64 host, x86 target), Hostx86\\x64 (x86 host, x64 target), Hostx86\\x86 (native x86). Core tools: cl.exe (C/C++ compiler), link.exe (linker), lib.exe (library manager), nmake.exe (make), ml.exe (MASM x86 assembler), dumpbin.exe (binary inspector), editbin.exe (binary editor), cvtres.exe (resource converter), undname.exe (C++ symbol demangler), mspdbsrv.exe (PDB server), mspdbcmf.exe (PDB compactor), ifc.exe (C++20 module IFC compiler), xdcmake.exe (XML doc comment compiler), bscmake.exe (browse info). PGO tools: pgocvt.exe, pgomgr.exe, pgosweep.exe. Performance: vcperf.exe (ETW build profiler). Use when: compiling C/C++ with MSVC 14.29, linking, inspecting binaries, demangling symbols, working with PDB files, or using PGO."
category = "compiler"
files = false

[env]
root_x64    = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\bin\\Hostx64\\x64"
root_x86    = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\bin\\Hostx86\\x86"
root_x64_x86 = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\bin\\Hostx64\\x86"
root_x86_x64 = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Tools\\MSVC\\14.29.30133\\bin\\Hostx86\\x64"
msvc_ver     = "14.29.30133"

[tools]
"cl.exe"       = "C/C++ compiler — compiles .c/.cpp to .obj, outputs diagnostics"
"link.exe"     = "Linker — links .obj/.lib to .exe/.dll, generates .pdb"
"lib.exe"      = "Library manager — creates/modifies .lib static libraries, extracts members"
"nmake.exe"    = "Make utility — processes Makefile rules"
"ml.exe"       = "MASM x86 assembler — assembles .asm to .obj (ml64.exe for x64)"
"dumpbin.exe"  = "COFF binary inspector — sections, symbols, imports, exports, headers"
"editbin.exe"  = "COFF binary editor — change subsystem, stack size, heap size"
"cvtres.exe"   = "Resource converter — .RES binary → COFF .obj for linking"
"ifc.exe"      = "C++20 named module IFC compiler — builds module interface units"
"undname.exe"  = "C++ symbol demangler — decodes decorated names (e.g. ?f@@YAXXZ → f())"
"mspdbsrv.exe" = "PDB server — multi-process coordinator for .pdb file access during build"
"mspdbcmf.exe" = "PDB compactor — minimizes .pdb file size after build"
"xdcmake.exe"  = "XML doc comment compiler — processes /// Doxygen-style comments → .xdc/.xml"
"bscmake.exe"  = "Browse info file maintainer — creates .bsc files for legacy VS browse DB"
"pgocvt.exe"   = "PGO converter — converts .pgc profile data → .pgd database"
"pgomgr.exe"   = "PGO manager — merges multiple .pgc run files into single .pgd"
"pgosweep.exe" = "PGO sweep — flushes in-process profile counters to .pgc file at runtime"
"vcperf.exe"   = "VC++ performance profiler — ETW-based build performance tracing"
"vctip.exe"    = "VS telemetry improvement program — safe to ignore in agent context"

[actions.compile]
description = "Compile C/C++ source with cl.exe — flags, output, diagnostics"
entrypoint  = "cl.exe"
permissions = ["exec:compiler"]
resources.memory  = "512MB"
resources.timeout = "120s"

[actions.link]
description = "Link objects and libraries with link.exe — exports, PDB, subsystem"
entrypoint  = "link.exe"
permissions = ["exec:compiler"]
resources.memory  = "256MB"
resources.timeout = "60s"

[actions.inspect]
description = "Inspect a binary with dumpbin.exe — imports, exports, sections, symbols"
entrypoint  = "dumpbin.exe"
permissions = ["exec:tool"]
resources.memory  = "64MB"
resources.timeout = "10s"

[actions.demangle]
description = "Demangle C++ decorated symbol names with undname.exe"
entrypoint  = "undname.exe"
permissions = ["exec:tool"]
resources.memory  = "16MB"
resources.timeout = "5s"

[actions.pgo]
description = "Profile-Guided Optimization workflow — pgomgr, pgosweep, pgocvt"
entrypoint  = "query"
permissions = ["exec:tool"]
resources.memory  = "64MB"
resources.timeout = "30s"
