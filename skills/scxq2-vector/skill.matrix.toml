id = "scxq2-vector"
name = "SCXQ2 Vector Runner"
version = "1.0.0"
description = "Native SCXQ2 GPU vector instruction runner. Executes SCXQ2 quantized expert weight instructions directly on GPU via the native runtime. Used for low-level expert execution benchmarking and validation."
category = "native-asx"
files = true
binary_root = "artifacts/native-asx"

[actions.run]
description = "Execute a SCXQ2 instruction stream through the native GPU vector runner"
entrypoint = "scxq2_vector_runner.exe"
permissions = ["read:artifacts", "exec:gpu"]
resources.memory = "512MB"
resources.timeout = "60s"
