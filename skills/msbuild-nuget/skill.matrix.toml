id = "msbuild-nuget"
name = "MSBuild NuGet Build Tasks (VS 2022 BuildTools 17.x)"
version = "1.0.0"
description = "MSBuild-integrated NuGet build tasks for Visual Studio 2022 BuildTools (MSBuild 17.x). Located at MSBuild\\Microsoft\\NuGet\\17.0\\. Contains: Microsoft.NuGet.Build.Tasks.dll (v17.2.0, the MSBuild task assembly that resolves NuGet package assets and project.lock.json/project.assets.json during build), Microsoft.NuGet.props (imported early — conditionally imports per-project .nuget.props), Microsoft.NuGet.targets (defines ResolveNuGetPackageAssets task, handles PackageReference and legacy project.json restore), and Newtonsoft.Json.dll (Json.NET v13.0.1, used internally by the build tasks to parse lock files and assets JSON). Use when: debugging NuGet restore failures in MSBuild, understanding how package assets are resolved at build time, or authoring MSBuild projects that customize NuGet integration."
category = "sdk"
files = false

[env]
root          = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\NuGet\\17.0"
tasks_dll     = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\NuGet\\17.0\\Microsoft.NuGet.Build.Tasks.dll"
nuget_props   = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\NuGet\\17.0\\Microsoft.NuGet.props"
nuget_targets = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\NuGet\\17.0\\Microsoft.NuGet.targets"
json_net_dll  = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\NuGet\\17.0\\Newtonsoft.Json.dll"

[versions]
msbuild_nuget_tasks = "17.2.0-prerelease.23116.1"
json_net            = "13.0.1"

[actions.query]
description = "Explain MSBuild NuGet task assembly, props/targets import chain, and asset resolution flow"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"

[actions.debug_restore]
description = "Diagnose NuGet restore or asset resolution failures in MSBuild 17.x builds"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"
