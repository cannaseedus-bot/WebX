id = "ptvs-build"
name = "Python Tools for Visual Studio - MSBuild Integration (v17.0)"
version = "1.0.0"
description = "Python Tools for Visual Studio (PTVS) MSBuild integration layer, v17.0.25079.8, installed under VS 2022 BuildTools. Provides MSBuild targets and task assemblies for building, publishing, and deploying Python projects (including Django, Azure Web Role, and Azure Worker Role). Key files: Microsoft.PythonTools.targets (core Python project build), Microsoft.PythonTools.Web.targets (Azure/IIS web deployment), Microsoft.PythonTools.Django.targets (Django collectstatic/manage.py integration), Microsoft.PythonTools.Worker.targets (Azure Worker Role), Microsoft.PythonTools.BuildTasks.Core.dll (MSBuild task implementations), Microsoft.PythonTools.Common.dll (shared utilities), Microsoft.PythonTools.WebRole.dll (Azure Cloud Service web role support), wfastcgi.py v3.0.0 (WFastCGI WSGI-to-FastCGI bridge for IIS/Azure Python deployment). Use when: building Python projects via MSBuild, deploying Python web apps to IIS or Azure, integrating Django management commands into the build pipeline, or debugging PTVS target import failures."
category = "sdk"
files = false

[env]
root              = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\VisualStudio\\v17.0\\Python Tools"
targets_core      = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\VisualStudio\\v17.0\\Python Tools\\Microsoft.PythonTools.targets"
targets_web       = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\VisualStudio\\v17.0\\Python Tools\\Microsoft.PythonTools.Web.targets"
targets_django    = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\VisualStudio\\v17.0\\Python Tools\\Microsoft.PythonTools.Django.targets"
targets_worker    = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\VisualStudio\\v17.0\\Python Tools\\Microsoft.PythonTools.Worker.targets"
build_tasks_dll   = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\VisualStudio\\v17.0\\Python Tools\\Microsoft.PythonTools.BuildTasks.Core.dll"
common_dll        = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\VisualStudio\\v17.0\\Python Tools\\Microsoft.PythonTools.Common.dll"
webrole_dll       = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\VisualStudio\\v17.0\\Python Tools\\Microsoft.PythonTools.WebRole.dll"
wfastcgi          = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\MSBuild\\Microsoft\\VisualStudio\\v17.0\\Python Tools\\wfastcgi.py"

[versions]
ptvs    = "17.0.25079.8"
wfastcgi = "3.0.0"

[actions.query]
description = "Explain PTVS MSBuild targets, task assemblies, and Python project build integration"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"

[actions.debug_build]
description = "Diagnose PTVS MSBuild target import failures or Python project build errors"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"

[actions.wfastcgi]
description = "Explain wfastcgi.py WSGI-to-FastCGI bridge for IIS/Azure Python deployment"
entrypoint  = "query"
permissions = ["read:sdk"]
resources.memory  = "16MB"
resources.timeout = "2s"
