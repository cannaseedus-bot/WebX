id = "mx2lex"
name = "MX2LEX Tools"
version = "1.0.0"
description = "Native MX2LEX lexer toolchain: compile grammars to DFA, validate tokens against an oracle reference, and run lexer vector pipelines. Produces .compiled.dfa.asx artifacts consumed by the ASX runtime."
category = "native-asx"
files = true
binary_root = "artifacts/native-asx"

[actions.compile]
description = "Compile an MX2LEX grammar definition into a binary DFA (.compiled.dfa.asx)"
entrypoint = "mx2lex_compile.exe"
permissions = ["read:artifacts", "write:artifacts"]
resources.memory = "64MB"
resources.timeout = "10s"

[actions.oracle]
description = "Validate a token stream against the MX2LEX oracle reference implementation"
entrypoint = "mx2lex_oracle.exe"
permissions = ["read:artifacts"]
resources.memory = "64MB"
resources.timeout = "10s"

[actions.vector_run]
description = "Execute an MX2LEX lexer pass through the native vector runner"
entrypoint = "mx2lex_vector_runner.exe"
permissions = ["read:artifacts", "exec:gpu"]
resources.memory = "256MB"
resources.timeout = "30s"
