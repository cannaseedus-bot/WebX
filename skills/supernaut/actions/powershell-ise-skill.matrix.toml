id = "powershell-ise"
name = "Windows PowerShell ISE"
version = "1.0.0"
description = "Windows PowerShell 5.1 ISE (Integrated Scripting Environment) launcher. Two variants: x64 (system32) and x86 (syswow64). Use for interactive editing, debugging, and testing of PowerShell scripts — especially MX2LM launcher scripts, VS build bootstraps, and system integration scripts."
category = "shell"
files = false

[env]
ps_version   = "5.1.19041.6093"
ps_edition   = "Desktop"
clr_version  = "4.0.30319.42000"

[actions.ise_x64]
description = "Launch Windows PowerShell ISE (x64) — C:\\windows\\system32\\WindowsPowerShell\\v1.0\\PowerShell_ISE.exe"
entrypoint   = "exec"
binary       = "C:\\windows\\system32\\WindowsPowerShell\\v1.0\\PowerShell_ISE.exe"
permissions  = ["exec:powershell", "read:filesystem"]
resources.memory  = "256MB"
resources.timeout = "0s"

[actions.ise_x86]
description = "Launch Windows PowerShell ISE (x86/32-bit) — C:\\windows\\syswow64\\WindowsPowerShell\\v1.0\\PowerShell_ISE.exe"
entrypoint   = "exec"
binary       = "C:\\windows\\syswow64\\WindowsPowerShell\\v1.0\\PowerShell_ISE.exe"
permissions  = ["exec:powershell", "read:filesystem"]
resources.memory  = "256MB"
resources.timeout = "0s"
